<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 98 - Locale Bundles and IME Fixture</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: #111827;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      p {
        margin: 0 0 10px;
        color: #475569;
        font-size: 13px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .controls button {
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #f8fafc;
        color: #0f172a;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      #summary {
        margin: 0 0 10px;
        padding: 10px 12px;
        border: 1px solid #d5dbe3;
        background: #fcfdff;
        font-size: 12px;
        white-space: pre-wrap;
      }

      #grid {
        width: 920px;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>Example 98 - Locale Bundles and IME Fixture</h1>
    <p>built-in locale bundle helper와 editor IME composition guard를 함께 검증하는 E6.3 fixture입니다.</p>

    <div class="controls">
      <button id="bundle-en" type="button">bundle en-US</button>
      <button id="bundle-de" type="button">bundle de-DE</button>
      <button id="bundle-ko" type="button">bundle ko-KR</button>
      <button id="open-editor" type="button">open name editor</button>
      <button id="start-composition" type="button">start composition</button>
      <button id="end-composition" type="button">end composition</button>
      <button id="inspect" type="button">inspect</button>
    </div>

    <pre id="summary">Ready</pre>

    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      const rowData = [
        { id: 1, name: '초기값', status: 'active', updatedAt: '2026-03-06T00:00:00.000Z' },
        { id: 2, name: '두번째', status: 'idle', updatedAt: '2026-03-07T00:00:00.000Z' }
      ];

      let currentLocale = 'ko-KR';

      function resolveBundle(locale) {
        return HGrid.getGridLocaleTextBundle(locale) || HGrid.getGridLocaleTextBundle('en-US');
      }

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns: [
          { id: '__indicatorCheckbox', header: '', width: 56, type: 'boolean' },
          { id: 'id', header: 'ID', width: 90, type: 'number', pinned: 'left' },
          { id: 'name', header: 'Name', width: 220, type: 'text', editable: true },
          { id: 'status', header: 'Status', width: 160, type: 'text' },
          { id: 'updatedAt', header: 'Updated At', width: 220, type: 'date' }
        ],
        rowData,
        locale: currentLocale,
        localeText: resolveBundle(currentLocale),
        height: 220,
        rowHeight: 28,
        overscan: 4
      });

      const summaryElement = document.getElementById('summary');

      function waitFrame() {
        return new Promise((resolve) => requestAnimationFrame(() => resolve()));
      }

      function getRoot() {
        return document.querySelector('#grid .hgrid');
      }

      function getEditorInput() {
        return document.querySelector('#grid .hgrid__editor-input');
      }

      function getFirstNameCell() {
        return document.querySelector('.hgrid__row--center[data-row-index="0"] .hgrid__cell[data-column-id="name"]');
      }

      function getSnapshot() {
        const root = getRoot();
        const editorInput = getEditorInput();
        const editorHost = document.querySelector('#grid .hgrid__editor-host');
        const firstNameCell = getFirstNameCell();
        const checkAll = document.querySelector('#grid .hgrid__indicator-checkall');

        return {
          locale: currentLocale,
          rootHasFocus: document.activeElement === root,
          activeDescendant: root ? root.getAttribute('aria-activedescendant') : null,
          editor: {
            isEditing: Boolean(editorHost && editorHost.classList.contains('hgrid__editor-host--visible')),
            value: editorInput ? editorInput.value : null
          },
          firstNameText: firstNameCell ? firstNameCell.textContent : null,
          checkAllAriaLabel: checkAll ? checkAll.getAttribute('aria-label') : null
        };
      }

      function renderSummary(label) {
        summaryElement.textContent = JSON.stringify({ label, snapshot: getSnapshot() }, null, 2);
      }

      function setLocale(locale) {
        currentLocale = locale;
        grid.setOptions({
          locale,
          localeText: resolveBundle(locale)
        });
        renderSummary('set-locale');
      }

      async function openNameEditor() {
        grid.setSelection({
          activeCell: { rowIndex: 0, colIndex: 2 },
          cellRanges: [{ r1: 0, c1: 2, r2: 0, c2: 2 }],
          rowRanges: []
        });
        await waitFrame();
        const root = getRoot();
        if (root) {
          root.focus();
          root.dispatchEvent(new KeyboardEvent('keydown', { key: 'F2', bubbles: true, cancelable: true }));
        }
        await waitFrame();
        renderSummary('open-editor');
      }

      async function startComposition() {
        const editorInput = getEditorInput();
        if (!editorInput) {
          return;
        }

        editorInput.value = '한';
        editorInput.dispatchEvent(new CompositionEvent('compositionstart', { bubbles: true }));
        await waitFrame();
        renderSummary('composition-start');
      }

      async function endComposition() {
        const editorInput = getEditorInput();
        if (!editorInput) {
          return;
        }

        editorInput.dispatchEvent(new CompositionEvent('compositionend', { bubbles: true }));
        await waitFrame();
        renderSummary('composition-end');
      }

      async function sendEditorKey(key) {
        const editorInput = getEditorInput();
        if (!editorInput) {
          return;
        }

        editorInput.dispatchEvent(new KeyboardEvent('keydown', { key, bubbles: true, cancelable: true }));
        await waitFrame();
        renderSummary(`editor-key-${key}`);
      }

      document.getElementById('bundle-en').addEventListener('click', () => setLocale('en-US'));
      document.getElementById('bundle-de').addEventListener('click', () => setLocale('de-DE'));
      document.getElementById('bundle-ko').addEventListener('click', () => setLocale('ko-KR'));
      document.getElementById('open-editor').addEventListener('click', () => {
        void openNameEditor();
      });
      document.getElementById('start-composition').addEventListener('click', () => {
        void startComposition();
      });
      document.getElementById('end-composition').addEventListener('click', () => {
        void endComposition();
      });
      document.getElementById('inspect').addEventListener('click', () => renderSummary('inspect'));

      renderSummary('init');

      window.__example98 = {
        setLocale,
        openNameEditor,
        startComposition,
        endComposition,
        sendEditorKey,
        getSnapshot
      };
    </script>
  </body>
</html>
