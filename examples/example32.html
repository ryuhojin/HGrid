<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 32 - Tree Data</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 20px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      button {
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        color: #0f172a;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
      }

      #grid {
        width: 1100px;
        max-width: 100%;
      }

      #log {
        margin-top: 10px;
        height: 130px;
        overflow: auto;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        padding: 8px;
        font-size: 12px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Example 32 - Tree Data</h1>
    <div class="toolbar">
      <button id="mode-client">Mode: Client</button>
      <button id="mode-server">Mode: Server Lazy</button>
      <button id="collapse-all">Collapse All</button>
      <button id="expand-all">Expand All</button>
      <button id="expand-root-100">Expand Root-100</button>
    </div>
    <div id="grid"></div>
    <pre id="log" aria-live="polite"></pre>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      const columns = [
        { id: 'id', header: 'ID', width: 110, type: 'number' },
        { id: 'name', header: 'Name', width: 260, type: 'text' },
        { id: 'parentId', header: 'Parent ID', width: 130, type: 'number' },
        { id: 'department', header: 'Department', width: 180, type: 'text' },
        { id: 'score', header: 'Score', width: 120, type: 'number' },
        { id: 'updatedAt', header: 'Updated At', width: 230, type: 'date' }
      ];

      const baseRows = [
        { id: 100, parentId: null, name: 'Root-100', department: 'HQ', score: 80, hasChildren: true, updatedAt: new Date().toISOString() },
        { id: 200, parentId: null, name: 'Root-200', department: 'Sales', score: 73, hasChildren: true, updatedAt: new Date().toISOString() },
        { id: 210, parentId: 200, name: 'Child-200-1', department: 'Sales', score: 61, hasChildren: false, updatedAt: new Date().toISOString() },
        { id: 220, parentId: 200, name: 'Child-200-2', department: 'Sales', score: 66, hasChildren: false, updatedAt: new Date().toISOString() }
      ];

      class SyntheticTreeProvider {
        constructor(rowCount) {
          this.rowCount = rowCount;
        }

        getRowCount() {
          return this.rowCount;
        }

        getRowKey(dataIndex) {
          return dataIndex + 1;
        }

        getParentId(dataIndex) {
          if (dataIndex <= 0) {
            return null;
          }
          return Math.floor((dataIndex - 1) / 3) + 1;
        }

        getHasChildren(dataIndex) {
          return dataIndex * 3 + 1 < this.rowCount;
        }

        getValue(dataIndex, columnId) {
          if (columnId === 'id') {
            return dataIndex + 1;
          }

          if (columnId === 'parentId') {
            return this.getParentId(dataIndex);
          }

          if (columnId === 'name') {
            return `Node-${String(dataIndex + 1)}`;
          }

          if (columnId === 'department') {
            return dataIndex % 2 === 0 ? 'HQ' : 'Sales';
          }

          if (columnId === 'score') {
            return (dataIndex * 17) % 1000;
          }

          if (columnId === 'hasChildren') {
            return this.getHasChildren(dataIndex);
          }

          if (columnId === 'updatedAt') {
            return new Date(Date.now() - dataIndex * 3000).toISOString();
          }

          return undefined;
        }

        getRow(dataIndex) {
          return {
            id: dataIndex + 1,
            parentId: this.getParentId(dataIndex),
            name: `Node-${String(dataIndex + 1)}`,
            department: dataIndex % 2 === 0 ? 'HQ' : 'Sales',
            score: (dataIndex * 17) % 1000,
            hasChildren: this.getHasChildren(dataIndex),
            updatedAt: new Date(Date.now() - dataIndex * 3000).toISOString()
          };
        }

        setValue() {}
        applyTransactions() {}
      }

      const lazyChildrenByParent = {
        100: [
          { id: 110, parentId: 100, name: 'Child-100-1', department: 'HQ', score: 49, hasChildren: false, updatedAt: new Date().toISOString() },
          { id: 120, parentId: 100, name: 'Child-100-2', department: 'HQ', score: 55, hasChildren: true, updatedAt: new Date().toISOString() }
        ],
        120: [
          { id: 121, parentId: 120, name: 'Child-120-1', department: 'HQ', score: 41, hasChildren: false, updatedAt: new Date().toISOString() }
        ]
      };

      let lazyLoadCount = 0;
      const logElement = document.getElementById('log');
      const appendLog = (message) => {
        const line = `[${new Date().toISOString()}] ${message}`;
        logElement.textContent = `${line}\n${logElement.textContent}`.slice(0, 14000);
      };

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData: baseRows,
        treeData: {
          enabled: true,
          mode: 'client',
          idField: 'id',
          parentIdField: 'parentId',
          hasChildrenField: 'hasChildren',
          treeColumnId: 'name',
          defaultExpanded: true
        },
        height: 460,
        rowHeight: 30,
        overscan: 8
      });

      const applyMode = async (mode) => {
        if (mode === 'client') {
          await grid.setTreeDataOptions({
            enabled: true,
            mode: 'client',
            idField: 'id',
            parentIdField: 'parentId',
            hasChildrenField: 'hasChildren',
            treeColumnId: 'name',
            defaultExpanded: true,
            loadChildren: undefined
          });
          appendLog('setTreeDataOptions(mode=client)');
          return;
        }

        await grid.setTreeDataOptions({
          enabled: true,
          mode: 'server',
          idField: 'id',
          parentIdField: 'parentId',
          hasChildrenField: 'hasChildren',
          treeColumnId: 'name',
          defaultExpanded: false,
          loadChildren: async ({ parentNodeKey }) => {
            lazyLoadCount += 1;
            await new Promise((resolve) => setTimeout(resolve, 60));
            return {
              rows: (lazyChildrenByParent[parentNodeKey] || []).map((row) => ({ ...row }))
            };
          }
        });
        appendLog('setTreeDataOptions(mode=server lazy)');
      };

      document.getElementById('mode-client').addEventListener('click', () => {
        void applyMode('client');
      });

      document.getElementById('mode-server').addEventListener('click', () => {
        void applyMode('server');
      });

      document.getElementById('collapse-all').addEventListener('click', () => {
        void (async () => {
          await grid.collapseAllTreeNodes();
          appendLog('collapseAllTreeNodes()');
        })();
      });

      document.getElementById('expand-all').addEventListener('click', () => {
        void (async () => {
          await grid.expandAllTreeNodes();
          appendLog('expandAllTreeNodes()');
        })();
      });

      document.getElementById('expand-root-100').addEventListener('click', () => {
        void (async () => {
          await grid.setTreeExpanded(100, true);
          appendLog('setTreeExpanded(100, true)');
        })();
      });

      window.__example32 = {
        getSnapshot() {
          const rows = grid.getTreeRowsSnapshot();
          return {
            mode: grid.getTreeDataOptions().mode,
            rowCount: rows.length,
            firstNodeKey: rows.length > 0 ? rows[0].nodeKey : null,
            hasTreeCell: document.querySelectorAll('.hgrid__cell--tree').length > 0,
            lazyLoadCount
          };
        },
        async expandRoot100() {
          await grid.setTreeExpanded(100, true);
        },
        async runPerfScenario() {
          const provider = new SyntheticTreeProvider(100000);
          grid.setOptions({ dataProvider: provider });
          await grid.setTreeDataOptions({
            enabled: true,
            mode: 'client',
            idField: 'id',
            parentIdField: 'parentId',
            hasChildrenField: 'hasChildren',
            treeColumnId: 'name',
            defaultExpanded: false
          });
          await grid.setTreeExpanded(1, true);
          await grid.setTreeExpanded(2, true);
          return {
            rowCount: grid.getTreeRowsSnapshot().length
          };
        }
      };

      appendLog('Tree data example initialized');
    </script>
  </body>
</html>
