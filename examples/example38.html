<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 38 - ARIA Grid Semantics</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: #111827;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      p {
        margin: 0 0 10px;
        color: #475569;
        font-size: 13px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .controls button {
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #f8fafc;
        color: #0f172a;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      #summary {
        margin: 0 0 10px;
        padding: 10px 12px;
        border: 1px solid #d5dbe3;
        background: #fcfdff;
        font-size: 12px;
        white-space: pre-wrap;
      }

      #grid {
        width: 1080px;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>Example 38 - ARIA Grid Semantics</h1>
    <p>Root ARIA metadata, row/col indices, and aria-activedescendant synchronization demo.</p>

    <div class="controls">
      <button id="focus-root" type="button">focus root</button>
      <button id="active-top" type="button">active (row1, name)</button>
      <button id="active-mid" type="button">active (row500, score)</button>
      <button id="clear-selection" type="button">clear selection</button>
      <button id="inspect" type="button">inspect ARIA</button>
    </div>

    <pre id="summary">Ready</pre>

    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      const columns = [
        { id: 'id', header: 'ID', width: 90, type: 'number', pinned: 'left' },
        { id: 'name', header: 'Name', width: 220, type: 'text' },
        { id: 'country', header: 'Country', width: 130, type: 'text' },
        { id: 'game', header: 'Game', width: 180, type: 'text' },
        { id: 'score', header: 'Score', width: 140, type: 'number' },
        { id: 'updatedAt', header: 'Updated At', width: 220, type: 'date', pinned: 'right' }
      ];

      const rowData = Array.from({ length: 1500 }, (_, index) => ({
        id: index + 1,
        name: 'Customer-' + (index + 1),
        country: ['KR', 'US', 'JP', 'DE'][index % 4],
        game: ['Chess', 'Go', 'Shogi', 'Checkers'][index % 4],
        score: (index * 17) % 10000,
        updatedAt: new Date(Date.now() - index * 120000).toISOString()
      }));

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData,
        height: 420,
        rowHeight: 28,
        overscan: 8,
        overscanCols: 2,
        columnGroups: [
          {
            groupId: 'participant',
            header: 'Participant',
            children: ['name', 'country']
          },
          {
            groupId: 'metrics',
            header: 'Metrics',
            children: ['game', 'score']
          }
        ]
      });

      const summaryElement = document.getElementById('summary');

      function getRoot() {
        return document.querySelector('#grid .hgrid');
      }

      function getSnapshot() {
        const root = getRoot();
        if (!root) {
          return { error: 'grid root not found' };
        }

        const activeCellId = root.getAttribute('aria-activedescendant') || '';
        const activeCell = activeCellId ? document.getElementById(activeCellId) : null;
        const firstCenterRow = document.querySelector('.hgrid__row--center[data-row-index]');

        return {
          root: {
            role: root.getAttribute('role'),
            tabindex: root.getAttribute('tabindex'),
            rowcount: root.getAttribute('aria-rowcount'),
            colcount: root.getAttribute('aria-colcount'),
            activedescendant: activeCellId || null
          },
          activeCell: activeCell
            ? {
                id: activeCell.id,
                columnId: activeCell.getAttribute('data-column-id'),
                ariaRowIndex: activeCell.getAttribute('aria-rowindex'),
                ariaColIndex: activeCell.getAttribute('aria-colindex')
              }
            : null,
          firstVisibleCenterRow: firstCenterRow
            ? {
                rowIndex: firstCenterRow.getAttribute('data-row-index'),
                ariaRowIndex: firstCenterRow.getAttribute('aria-rowindex')
              }
            : null
        };
      }

      function renderSummary(label) {
        summaryElement.textContent = JSON.stringify({ label, snapshot: getSnapshot() }, null, 2);
      }

      function setActive(rowIndex, colIndex) {
        grid.setSelection({
          activeCell: { rowIndex, colIndex },
          cellRanges: [],
          rowRanges: []
        });
      }

      document.getElementById('focus-root').addEventListener('click', () => {
        const root = getRoot();
        if (root) {
          root.focus();
        }
        renderSummary('focus-root');
      });

      document.getElementById('active-top').addEventListener('click', () => {
        setActive(0, 1);
        renderSummary('active-top');
      });

      document.getElementById('active-mid').addEventListener('click', () => {
        setActive(499, 4);
        renderSummary('active-mid');
      });

      document.getElementById('clear-selection').addEventListener('click', () => {
        grid.clearSelection();
        renderSummary('clear-selection');
      });

      document.getElementById('inspect').addEventListener('click', () => {
        renderSummary('inspect');
      });

      grid.on('selectionChange', () => {
        renderSummary('selection-change');
      });

      setActive(0, 1);
      renderSummary('init');

      window.__example38 = {
        getSnapshot,
        setActive
      };
    </script>
  </body>
</html>
