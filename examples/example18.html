<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 18 - Keyboard Navigation</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: #0f172a;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .controls button {
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
      }

      #log {
        margin-bottom: 12px;
        padding: 10px 12px;
        border: 1px solid #d5dbe3;
        background: #fcfdff;
        font-size: 12px;
      }

      #grid {
        width: 1040px;
      }
    </style>
  </head>
  <body>
    <h1>Example 18 - Keyboard Navigation</h1>
    <div class="controls">
      <button id="focus-grid" type="button">focus grid</button>
      <button id="run-arrows" type="button">run arrows</button>
      <button id="run-shift-range" type="button">run shift range</button>
      <button id="run-page" type="button">run page up/down</button>
      <button id="run-edge" type="button">run ctrl/cmd home/end</button>
      <button id="inspect" type="button">inspect</button>
    </div>
    <pre id="log">Ready</pre>
    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      const columns = [
        { id: 'id', header: 'ID', width: 110, type: 'number', pinned: 'left' },
        { id: 'name', header: 'Name', width: 240, type: 'text' },
        { id: 'language', header: 'Language', width: 180, type: 'text' },
        { id: 'country', header: 'Country', width: 180, type: 'text' },
        { id: 'game', header: 'Game', width: 220, type: 'text' },
        { id: 'score', header: 'Score', width: 140, type: 'number' },
        { id: 'status', header: 'Status', width: 140, type: 'text', pinned: 'right' }
      ];

      const rowData = Array.from({ length: 5000 }, (_, index) => ({
        id: index + 1,
        name: 'User-' + (index + 1),
        language: ['English', 'Korean', 'Spanish', 'French'][index % 4],
        country: ['KR', 'US', 'JP', 'DE'][index % 4],
        game: ['Chess', 'Go', 'Sudoku', 'Mahjong'][index % 4],
        score: (index * 17) % 1000,
        status: index % 2 === 0 ? 'active' : 'idle',
      }));

      const logElement = document.getElementById('log');
      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData,
        height: 420,
        rowHeight: 28,
        overscan: 6,
        overscanCols: 2
      });

      let selectionEventCount = 0;
      let lastSource = 'none';

      grid.on('selectionChange', (event) => {
        selectionEventCount += 1;
        lastSource = event.source;
      });

      function waitFrame() {
        return new Promise((resolve) => requestAnimationFrame(() => resolve()));
      }

      function writeLog(payload) {
        logElement.textContent = JSON.stringify(payload);
      }

      function getSnapshot() {
        const root = document.querySelector('.hgrid');
        const state = grid.getState();
        const selection = grid.getSelection();
        return {
          scrollTop: Math.round(state.scrollTop),
          selection,
          selectedCellDom: document.querySelectorAll('.hgrid__cell--selected').length,
          activeCellDom: document.querySelectorAll('.hgrid__cell--active').length,
          focusedOnGrid: document.activeElement === root,
          selectionEventCount,
          lastSource
        };
      }

      function sendKey(key, options) {
        const root = document.querySelector('.hgrid');
        root.dispatchEvent(
          new KeyboardEvent(
            'keydown',
            Object.assign(
              {
                key,
                bubbles: true,
                cancelable: true
              },
              options || {}
            )
          )
        );
      }

      async function runArrows() {
        sendKey('ArrowDown');
        sendKey('ArrowRight');
        sendKey('ArrowRight');
        await waitFrame();
        writeLog({
          label: 'run-arrows',
          snapshot: getSnapshot()
        });
      }

      async function runShiftRange() {
        sendKey('ArrowDown', { shiftKey: true });
        sendKey('ArrowDown', { shiftKey: true });
        sendKey('ArrowRight', { shiftKey: true });
        await waitFrame();
        writeLog({
          label: 'run-shift-range',
          snapshot: getSnapshot()
        });
      }

      async function runPage() {
        sendKey('PageDown');
        sendKey('PageDown');
        await waitFrame();
        const afterDown = getSnapshot();
        sendKey('PageUp');
        await waitFrame();
        writeLog({
          label: 'run-page',
          afterDown,
          afterUp: getSnapshot()
        });
      }

      async function runEdge() {
        sendKey('End', { ctrlKey: true });
        await waitFrame();
        const endState = getSnapshot();
        sendKey('Home', { ctrlKey: true });
        await waitFrame();
        writeLog({
          label: 'run-edge',
          afterEnd: endState,
          afterHome: getSnapshot()
        });
      }

      document.getElementById('focus-grid').addEventListener('click', () => {
        document.querySelector('.hgrid').focus();
        writeLog({
          label: 'focus-grid',
          snapshot: getSnapshot()
        });
      });

      document.getElementById('run-arrows').addEventListener('click', () => {
        runArrows();
      });

      document.getElementById('run-shift-range').addEventListener('click', () => {
        runShiftRange();
      });

      document.getElementById('run-page').addEventListener('click', () => {
        runPage();
      });

      document.getElementById('run-edge').addEventListener('click', () => {
        runEdge();
      });

      document.getElementById('inspect').addEventListener('click', () => {
        writeLog({
          label: 'inspect',
          snapshot: getSnapshot()
        });
      });

      document.querySelector('.hgrid').focus();
      writeLog({
        label: 'initial',
        snapshot: getSnapshot()
      });
    </script>
  </body>
</html>
