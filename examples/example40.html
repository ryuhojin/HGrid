<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 40 - i18n Locale Formatting</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: #111827;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      p {
        margin: 0 0 10px;
        color: #475569;
        font-size: 13px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .controls button {
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #f8fafc;
        color: #0f172a;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      #summary {
        margin: 0 0 10px;
        padding: 10px 12px;
        border: 1px solid #d5dbe3;
        background: #fcfdff;
        font-size: 12px;
        white-space: pre-wrap;
      }

      #grid {
        width: 1040px;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>Example 40 - i18n Locale Formatting</h1>
    <p>built-in locale bundle helper와 고객사 formatting recipe를 함께 검증하는 i18n 예제입니다.</p>

    <div class="controls">
      <button id="bundle-en" type="button">bundle en-US</button>
      <button id="bundle-de" type="button">bundle de-DE</button>
      <button id="bundle-ko" type="button">bundle ko-KR</button>
      <button id="recipe-finance" type="button">recipe finance de-DE</button>
      <button id="inspect" type="button">inspect</button>
    </div>

    <pre id="summary">Ready</pre>

    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      const DEFAULT_NUMBER_FORMAT_OPTIONS = {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      };

      const DEFAULT_DATE_TIME_FORMAT_OPTIONS = {
        timeZone: 'UTC',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      };

      const FINANCE_DE_NUMBER_FORMAT_OPTIONS = {
        style: 'currency',
        currency: 'EUR',
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      };

      const rowData = Array.from({ length: 400 }, (_, index) => ({
        id: index + 1,
        amount: 1234567.89 + index,
        updatedAt: new Date(Date.UTC(2026, 2, 6, 0, 0, 0) + index * 60000).toISOString(),
        status: index % 2 === 0 ? 'active' : 'idle'
      }));

      let currentLocale = 'en-US';
      let currentRecipeId = 'bundle';
      let activeNumberFormatOptions = DEFAULT_NUMBER_FORMAT_OPTIONS;
      let activeDateTimeFormatOptions = DEFAULT_DATE_TIME_FORMAT_OPTIONS;

      function resolveBundle(locale) {
        return HGrid.getGridLocaleTextBundle(locale) || HGrid.getGridLocaleTextBundle('en-US');
      }

      function buildLocaleRecipe(locale, recipeId) {
        const baseLocaleText = resolveBundle(locale);
        if (recipeId === 'finance-de') {
          return {
            locale: 'de-DE',
            recipeId,
            localeText: {
              ...resolveBundle('de-DE'),
              selectAllRows: 'Finanzzeilen auswählen ({scope})'
            },
            numberFormatOptions: FINANCE_DE_NUMBER_FORMAT_OPTIONS,
            dateTimeFormatOptions: DEFAULT_DATE_TIME_FORMAT_OPTIONS
          };
        }

        return {
          locale,
          recipeId: 'bundle',
          localeText: baseLocaleText,
          numberFormatOptions: DEFAULT_NUMBER_FORMAT_OPTIONS,
          dateTimeFormatOptions: DEFAULT_DATE_TIME_FORMAT_OPTIONS
        };
      }

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns: [
          { id: '__indicatorCheckbox', header: '', width: 56, type: 'boolean' },
          { id: 'id', header: 'ID', width: 90, type: 'number', pinned: 'left' },
          { id: 'amount', header: 'Amount', width: 180, type: 'number' },
          { id: 'updatedAt', header: 'Updated At', width: 220, type: 'date' },
          { id: 'status', header: 'Status', width: 140, type: 'text' }
        ],
        rowData,
        locale: currentLocale,
        localeText: resolveBundle(currentLocale),
        numberFormatOptions: activeNumberFormatOptions,
        dateTimeFormatOptions: activeDateTimeFormatOptions,
        height: 420,
        rowHeight: 28,
        overscan: 8
      });

      const summaryElement = document.getElementById('summary');

      function getRoot() {
        return document.querySelector('#grid .hgrid');
      }

      function getFirstCell(columnId) {
        return document.querySelector('.hgrid__row--center[data-row-index="0"] .hgrid__cell[data-column-id="' + columnId + '"]');
      }

      function getSnapshot() {
        const root = getRoot();
        const amountCell = getFirstCell('amount');
        const dateCell = getFirstCell('updatedAt');
        const checkAll = document.querySelector('.hgrid__indicator-checkall');

        return {
          locale: currentLocale,
          recipeId: currentRecipeId,
          rootDir: root ? root.getAttribute('dir') : null,
          amountText: amountCell ? amountCell.textContent : null,
          dateText: dateCell ? dateCell.textContent : null,
          checkAllAriaLabel: checkAll ? checkAll.getAttribute('aria-label') : null,
          expectedAmountText: new Intl.NumberFormat(currentLocale, activeNumberFormatOptions).format(rowData[0].amount),
          expectedDateText: new Intl.DateTimeFormat(currentLocale, activeDateTimeFormatOptions).format(new Date(rowData[0].updatedAt))
        };
      }

      function renderSummary(label) {
        summaryElement.textContent = JSON.stringify({ label, snapshot: getSnapshot() }, null, 2);
      }

      function applyRecipe(nextLocale, recipeId) {
        const recipe = buildLocaleRecipe(nextLocale, recipeId);
        currentLocale = recipe.locale;
        currentRecipeId = recipe.recipeId;
        activeNumberFormatOptions = recipe.numberFormatOptions;
        activeDateTimeFormatOptions = recipe.dateTimeFormatOptions;
        grid.setOptions({
          locale: recipe.locale,
          localeText: recipe.localeText,
          numberFormatOptions: recipe.numberFormatOptions,
          dateTimeFormatOptions: recipe.dateTimeFormatOptions
        });
      }

      document.getElementById('bundle-en').addEventListener('click', () => {
        applyRecipe('en-US', 'bundle');
        renderSummary('bundle-en');
      });

      document.getElementById('bundle-de').addEventListener('click', () => {
        applyRecipe('de-DE', 'bundle');
        renderSummary('bundle-de');
      });

      document.getElementById('bundle-ko').addEventListener('click', () => {
        applyRecipe('ko-KR', 'bundle');
        renderSummary('bundle-ko');
      });

      document.getElementById('recipe-finance').addEventListener('click', () => {
        applyRecipe('de-DE', 'finance-de');
        renderSummary('recipe-finance');
      });

      document.getElementById('inspect').addEventListener('click', () => {
        renderSummary('inspect');
      });

      renderSummary('init');

      window.__example40 = {
        setLocale(locale) {
          applyRecipe(locale, 'bundle');
        },
        applyRecipe(recipeId) {
          if (recipeId === 'finance-de') {
            applyRecipe('de-DE', 'finance-de');
            return;
          }

          applyRecipe('en-US', 'bundle');
        },
        getSnapshot
      };
    </script>
  </body>
</html>
