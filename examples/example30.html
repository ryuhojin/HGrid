<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 30 - Remote DataProvider Block Cache</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: #0f172a;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .controls button {
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #f8fafc;
        padding: 6px 10px;
        cursor: pointer;
      }

      #log {
        margin: 0 0 12px;
        padding: 10px 12px;
        border: 1px solid #d5dbe3;
        background: #fcfdff;
        font-size: 12px;
        white-space: pre-wrap;
      }

      #grid {
        width: 1040px;
      }
    </style>
  </head>
  <body>
    <h1>Example 30 - Remote DataProvider Block Cache</h1>
    <div class="controls">
      <button id="sort-asc" type="button">sort id asc</button>
      <button id="sort-desc" type="button">sort id desc</button>
      <button id="filter-active" type="button">filter active</button>
      <button id="clear-query" type="button">clear query</button>
      <button id="scroll-bottom" type="button">scroll bottom</button>
      <button id="inspect" type="button">inspect</button>
    </div>
    <pre id="log">Ready</pre>
    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      const TOTAL_ROWS = 10_000_000;
      const BLOCK_SIZE = 800;
      const BASE_TIME = Date.UTC(2026, 0, 1, 0, 0, 0);
      let serverRequestCount = 0;

      function waitFrame() {
        return new Promise((resolve) => requestAnimationFrame(() => resolve()));
      }

      function resolveSortDirection(sortModel) {
        if (!Array.isArray(sortModel) || sortModel.length === 0) {
          return 'asc';
        }
        return sortModel[0].direction === 'desc' ? 'desc' : 'asc';
      }

      function resolveStatusFilterMode(filterModel) {
        if (!filterModel || typeof filterModel !== 'object') {
          return 'all';
        }

        const statusFilter = filterModel.status;
        if (!statusFilter || typeof statusFilter !== 'object') {
          return 'all';
        }

        if (statusFilter.type !== 'set' || !Array.isArray(statusFilter.values)) {
          return 'all';
        }

        if (statusFilter.values.length === 1 && statusFilter.values[0] === 'active') {
          return 'active';
        }

        return 'all';
      }

      function getFilteredRowCount(filterMode) {
        if (filterMode === 'active') {
          return Math.ceil(TOTAL_ROWS / 3);
        }
        return TOTAL_ROWS;
      }

      function mapLogicalIndexToSourceIndex(logicalIndex, filterMode, sortDirection) {
        const filteredRowCount = getFilteredRowCount(filterMode);
        const orderedIndex = sortDirection === 'desc' ? filteredRowCount - 1 - logicalIndex : logicalIndex;
        if (filterMode === 'active') {
          return orderedIndex * 3;
        }
        return orderedIndex;
      }

      function buildRowFromSourceIndex(sourceIndex) {
        const id = sourceIndex + 1;
        return {
          id,
          name: 'Customer-' + String(id).padStart(8, '0'),
          status: sourceIndex % 3 === 0 ? 'active' : 'idle',
          score: (sourceIndex * 17) % 1000,
          updatedAt: new Date(BASE_TIME - sourceIndex * 5000).toISOString()
        };
      }

      const columns = [
        { id: 'id', header: 'ID', width: 120, type: 'number', pinned: 'left' },
        { id: 'name', header: 'Name', width: 240, type: 'text' },
        { id: 'status', header: 'Status', width: 140, type: 'text' },
        { id: 'score', header: 'Score', width: 140, type: 'number' },
        { id: 'updatedAt', header: 'Updated At', width: 240, type: 'date' }
      ];

      const dataSource = {
        fetchBlock(request) {
          serverRequestCount += 1;

          const sortDirection = resolveSortDirection(request.queryModel.sortModel);
          const filterMode = resolveStatusFilterMode(request.queryModel.filterModel);
          const totalRowCount = getFilteredRowCount(filterMode);
          const startIndex = Math.max(0, Math.min(totalRowCount, request.startIndex));
          const endIndex = Math.max(startIndex, Math.min(totalRowCount, request.endIndex));

          const rows = [];
          for (let logicalIndex = startIndex; logicalIndex < endIndex; logicalIndex += 1) {
            const sourceIndex = mapLogicalIndexToSourceIndex(logicalIndex, filterMode, sortDirection);
            rows.push(buildRowFromSourceIndex(sourceIndex));
          }

          return new Promise((resolve) => {
            setTimeout(() => {
              resolve({
                rows,
                totalRowCount
              });
            }, 24);
          });
        }
      };

      const provider = new HGrid.RemoteDataProvider({
        dataSource,
        rowCount: TOTAL_ROWS,
        cache: {
          blockSize: BLOCK_SIZE,
          maxBlocks: 20,
          prefetchBlocks: 1
        },
        loadingRowPolicy: 'skeleton'
      });

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        dataProvider: provider,
        height: 420,
        rowHeight: 28,
        overscan: 6
      });

      const logElement = document.getElementById('log');

      function getSnapshot() {
        const firstVisibleIdCell =
          document.querySelector('.hgrid__row--left .hgrid__cell[data-column-id="id"]') ||
          document.querySelector('.hgrid__row--center .hgrid__cell[data-column-id="id"]');
        const firstVisibleIdText = firstVisibleIdCell ? firstVisibleIdCell.textContent || '' : '';
        const firstVisibleId = Number(firstVisibleIdText);
        const cacheState = provider.getDebugState();

        return {
          rowCount: provider.getRowCount(),
          serverRequestCount,
          loadingCellCount: document.querySelectorAll('.hgrid__cell--loading').length,
          firstVisibleId: Number.isFinite(firstVisibleId) && firstVisibleId > 0 ? firstVisibleId : null,
          cacheState,
          queryModel: provider.getQueryModel(),
          gridState: grid.getState()
        };
      }

      function writeLog(label) {
        logElement.textContent = JSON.stringify({
          label,
          snapshot: getSnapshot()
        });
      }

      document.getElementById('sort-asc').addEventListener('click', async () => {
        await grid.setSortModel([{ columnId: 'id', direction: 'asc' }]);
        await waitFrame();
        writeLog('sort-asc');
      });

      document.getElementById('sort-desc').addEventListener('click', async () => {
        await grid.setSortModel([{ columnId: 'id', direction: 'desc' }]);
        await waitFrame();
        writeLog('sort-desc');
      });

      document.getElementById('filter-active').addEventListener('click', async () => {
        await grid.setFilterModel({
          status: {
            type: 'set',
            values: ['active']
          }
        });
        await waitFrame();
        writeLog('filter-active');
      });

      document.getElementById('clear-query').addEventListener('click', async () => {
        await grid.clearFilterModel();
        await grid.clearSortModel();
        await waitFrame();
        writeLog('clear-query');
      });

      document.getElementById('scroll-bottom').addEventListener('click', async () => {
        const verticalScroll = document.querySelector('.hgrid__v-scroll') || document.querySelector('.hgrid__viewport');
        if (!verticalScroll) {
          return;
        }

        verticalScroll.scrollTop = verticalScroll.scrollHeight;
        verticalScroll.dispatchEvent(new Event('scroll'));
        await waitFrame();
        writeLog('scroll-bottom');
      });

      document.getElementById('inspect').addEventListener('click', async () => {
        await waitFrame();
        writeLog('inspect');
      });

      window.__example30 = {
        getSnapshot() {
          return getSnapshot();
        }
      };

      writeLog('initial');
    </script>
  </body>
</html>
