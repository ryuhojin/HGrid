<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 23 - Worker Sort Filter</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: #0f172a;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .controls button {
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
      }

      .controls button:disabled {
        cursor: default;
        opacity: 0.55;
      }

      #log {
        margin-bottom: 12px;
        padding: 10px 12px;
        border: 1px solid #d5dbe3;
        background: #fcfdff;
        font-size: 12px;
        white-space: pre-wrap;
      }

      #grid {
        width: 1140px;
      }
    </style>
  </head>
  <body>
    <h1>Example 23 - Worker Sort Filter</h1>
    <div class="controls">
      <button id="sort-only" type="button">sort only</button>
      <button id="filter-only" type="button">filter only</button>
      <button id="sort-filter" type="button">sort + filter</button>
      <button id="clear-filter" type="button">clear filter</button>
      <button id="clear-sort" type="button">clear sort</button>
      <button id="clear-all" type="button">clear all</button>
      <button id="swap-1m" type="button">swap synthetic 1M</button>
      <button id="run-1m" type="button">run sort+filter 1M</button>
      <button id="inspect" type="button">inspect</button>
    </div>
    <pre id="log">Ready</pre>
    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      class SyntheticLargeDataProvider {
        constructor(rowCount) {
          this.rowCount = rowCount;
        }

        getRowCount() {
          return this.rowCount;
        }

        getRowKey(dataIndex) {
          return dataIndex;
        }

        getValue(dataIndex, columnId) {
          if (columnId === 'id') {
            return dataIndex + 1;
          }

          if (columnId === 'name') {
            return dataIndex % 11 === 0 ? 'Target-' + (dataIndex + 1) : 'User-' + (dataIndex + 1);
          }

          if (columnId === 'score') {
            return (dataIndex * 31) % 1000;
          }

          if (columnId === 'dueDate') {
            return '2026-03-' + String((dataIndex % 28) + 1).padStart(2, '0');
          }

          if (columnId === 'region') {
            return ['KR', 'US', 'JP', 'DE'][dataIndex % 4];
          }

          return null;
        }

        setValue() {}

        applyTransactions() {}

        getRow(dataIndex) {
          return {
            id: dataIndex + 1,
            name: dataIndex % 11 === 0 ? 'Target-' + (dataIndex + 1) : 'User-' + (dataIndex + 1),
            score: (dataIndex * 31) % 1000,
            dueDate: '2026-03-' + String((dataIndex % 28) + 1).padStart(2, '0'),
            region: ['KR', 'US', 'JP', 'DE'][dataIndex % 4]
          };
        }
      }

      const columns = [
        { id: 'id', header: 'ID', width: 110, type: 'number', pinned: 'left' },
        { id: 'name', header: 'Name', width: 240, type: 'text' },
        { id: 'score', header: 'Score', width: 160, type: 'number' },
        { id: 'dueDate', header: 'Due Date', width: 180, type: 'date' },
        { id: 'region', header: 'Region', width: 140, type: 'text', pinned: 'right' }
      ];

      const rowData = Array.from({ length: 7000 }, (_, index) => ({
        id: index + 1,
        name: index % 9 === 0 ? 'Target-' + (index + 1) : 'User-' + (index + 1),
        score: (index * 31) % 1000,
        dueDate: '2026-03-' + String((index % 28) + 1).padStart(2, '0'),
        region: ['KR', 'US', 'JP', 'DE'][index % 4]
      }));

      const sortModel = [
        { columnId: 'score', direction: 'desc' },
        { columnId: 'id', direction: 'asc' }
      ];

      const filterModel = {
        name: { kind: 'text', operator: 'contains', value: 'target', caseSensitive: false },
        score: { kind: 'number', operator: 'gte', value: 300 },
        dueDate: { kind: 'date', operator: 'between', min: '2026-03-05', max: '2026-03-20' },
        region: { kind: 'set', values: ['KR', 'US'] }
      };

      const logElement = document.getElementById('log');
      const buttons = Array.from(document.querySelectorAll('.controls button'));
      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData,
        height: 420,
        rowHeight: 28,
        overscan: 6,
        overscanCols: 2,
        workerRuntime: {
          assetBaseUrl: '../packages/grid-core/dist',
          timeoutMs: 180000
        }
      });

      let isSynthetic = false;
      let running = false;

      function setBusy(isBusy) {
        running = isBusy;
        for (const button of buttons) {
          if (button.id === 'inspect') {
            continue;
          }
          button.disabled = isBusy;
        }
      }

      function getRenderedCellText(rowIndex, columnId) {
        const cell = document.querySelector(
          '.hgrid__row[data-row-index="' + rowIndex + '"] .hgrid__cell[data-column-id="' + columnId + '"]'
        );
        if (!cell) {
          return null;
        }
        return cell.textContent;
      }

      function snapshot(label, extra) {
        const rowModelState = grid.getRowModelState();
        logElement.textContent = JSON.stringify({
          label,
          snapshot: {
            running,
            isSynthetic,
            sortModel: grid.getSortModel(),
            filterModel: grid.getFilterModel(),
            viewRowCount: rowModelState.viewRowCount,
            topRows: {
              r0: {
                id: Number(getRenderedCellText(0, 'id')),
                name: getRenderedCellText(0, 'name'),
                score: Number(getRenderedCellText(0, 'score')),
                dueDate: getRenderedCellText(0, 'dueDate'),
                region: getRenderedCellText(0, 'region')
              },
              r1: {
                id: Number(getRenderedCellText(1, 'id')),
                name: getRenderedCellText(1, 'name'),
                score: Number(getRenderedCellText(1, 'score')),
                dueDate: getRenderedCellText(1, 'dueDate'),
                region: getRenderedCellText(1, 'region')
              }
            }
          },
          extra: extra || null
        });
      }

      async function runAction(label, callback) {
        setBusy(true);
        const start = performance.now();
        try {
          await callback();
          snapshot(label, {
            elapsedMs: Math.round(performance.now() - start)
          });
        } catch (error) {
          snapshot(label + '-error', {
            message: error && error.message ? error.message : String(error)
          });
        } finally {
          setBusy(false);
        }
      }

      document.getElementById('sort-only').addEventListener('click', () => {
        runAction('sort-only', async () => {
          await grid.clearFilterModel();
          await grid.setSortModel(sortModel);
        });
      });

      document.getElementById('filter-only').addEventListener('click', () => {
        runAction('filter-only', async () => {
          await grid.clearSortModel();
          await grid.setFilterModel(filterModel);
        });
      });

      document.getElementById('sort-filter').addEventListener('click', () => {
        runAction('sort-filter', async () => {
          await grid.setSortModel(sortModel);
          await grid.setFilterModel(filterModel);
        });
      });

      document.getElementById('clear-filter').addEventListener('click', () => {
        runAction('clear-filter', async () => {
          await grid.clearFilterModel();
        });
      });

      document.getElementById('clear-sort').addEventListener('click', () => {
        runAction('clear-sort', async () => {
          await grid.clearSortModel();
        });
      });

      document.getElementById('clear-all').addEventListener('click', () => {
        runAction('clear-all', async () => {
          await grid.clearFilterModel();
          await grid.clearSortModel();
        });
      });

      document.getElementById('swap-1m').addEventListener('click', () => {
        grid.setOptions({ dataProvider: new SyntheticLargeDataProvider(1_000_000) });
        isSynthetic = true;
        snapshot('swap-1m');
      });

      document.getElementById('run-1m').addEventListener('click', () => {
        if (!isSynthetic) {
          snapshot('run-1m-skipped', { reason: 'swap synthetic first' });
          return;
        }

        runAction('run-1m', async () => {
          await grid.setSortModel(sortModel);
          await grid.setFilterModel(filterModel);
        });
      });

      document.getElementById('inspect').addEventListener('click', () => {
        snapshot('inspect');
      });

      snapshot('initial');
    </script>
  </body>
</html>
