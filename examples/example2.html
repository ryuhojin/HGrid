<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 2 - Public API Contract</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      #grid {
        width: 760px;
        margin-top: 12px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        padding: 6px 10px;
        border: 1px solid #b7c3d4;
        background: #f8fafc;
        cursor: pointer;
      }

      #log {
        margin-top: 12px;
        padding: 8px;
        border: 1px solid #d5dbe3;
        background: #fcfdff;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Example 2 - Public API Contract</h1>
    <div class="controls">
      <button id="set-columns">setColumns()</button>
      <button id="set-options">setOptions()</button>
      <button id="set-theme">setTheme()</button>
      <button id="save-state">getState()</button>
      <button id="restore-state">setState()</button>
      <button id="unbind-event">off()</button>
      <button id="bind-event">on()</button>
      <button id="destroy-grid">destroy()</button>
    </div>
    <pre id="log">Ready</pre>
    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      const columns = [
        { id: 'id', header: 'ID', width: 100, type: 'number' },
        { id: 'name', header: 'Name', width: 240, type: 'text' },
        { id: 'status', header: 'Status', width: 180, type: 'text' },
        { id: 'updatedAt', header: 'Updated At', width: 220, type: 'date' }
      ];

      const rowData = Array.from({ length: 1000 }, (_, index) => ({
        id: index + 1,
        name: 'Customer-' + (index + 1),
        status: index % 2 === 0 ? 'active' : 'idle',
        updatedAt: new Date(Date.now() - index * 60000).toISOString()
      }));

      const logElement = document.getElementById('log');
      const writeLog = (message) => {
        logElement.textContent = message;
      };

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData,
        height: 420,
        rowHeight: 28,
        overscan: 8
      });

      let savedState = grid.getState();
      const cellClickHandler = (event) => {
        writeLog(`cellClick row=${event.rowIndex} col=${event.columnId} value=${String(event.value)}`);
      };

      grid.on('cellClick', cellClickHandler);

      document.getElementById('set-columns').addEventListener('click', () => {
        grid.setColumns([
          { id: 'id', header: 'ID', width: 100, type: 'number' },
          { id: 'name', header: 'Name', width: 300, type: 'text' },
          { id: 'updatedAt', header: 'Updated At', width: 320, type: 'date' }
        ]);
        writeLog('setColumns() applied');
      });

      document.getElementById('set-options').addEventListener('click', () => {
        grid.setOptions({
          overscan: 12,
          rowHeight: 30
        });
        writeLog('setOptions() applied');
      });

      document.getElementById('set-theme').addEventListener('click', () => {
        grid.setTheme({
          '--hgrid-bg': '#f8fafc',
          '--hgrid-text': '#0f172a',
          '--hgrid-border-color': '#cbd5e1'
        });
        writeLog('setTheme() applied');
      });

      document.getElementById('save-state').addEventListener('click', () => {
        savedState = grid.getState();
        writeLog(`getState() => ${JSON.stringify(savedState)}`);
      });

      document.getElementById('restore-state').addEventListener('click', () => {
        grid.setState(savedState);
        writeLog(`setState() <= ${JSON.stringify(savedState)}`);
      });

      document.getElementById('unbind-event').addEventListener('click', () => {
        grid.off('cellClick', cellClickHandler);
        writeLog('off(cellClick) applied');
      });

      document.getElementById('bind-event').addEventListener('click', () => {
        grid.on('cellClick', cellClickHandler);
        writeLog('on(cellClick) applied');
      });

      document.getElementById('destroy-grid').addEventListener('click', () => {
        grid.destroy();
        writeLog('destroy() applied');
      });
    </script>
  </body>
</html>
