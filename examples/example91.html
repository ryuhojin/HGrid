<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 91 - Audit Schema and Masking</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: #111827;
        background: #f8fafc;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      p {
        margin: 0 0 14px;
        color: #475569;
        font-size: 13px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin: 0 0 14px;
      }

      .actions button {
        padding: 8px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 999px;
        background: #ffffff;
        color: #0f172a;
        font: inherit;
        cursor: pointer;
      }

      .summary {
        margin: 0 0 14px;
        padding: 12px 14px;
        border: 1px solid #d7dee8;
        border-radius: 12px;
        background: #ffffff;
        font-size: 12px;
        white-space: pre-wrap;
      }

      #grid {
        width: 940px;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>Example 91 - Audit Schema and Masking</h1>
    <p>`onAuditLog` payload의 `schemaVersion`을 읽고, email/phone 같은 민감값은 app-owned consumer에서 masking해서 기록하는 운영 패턴을 보여준다.</p>
    <div class="actions">
      <button id="edit-email" type="button">Edit Email</button>
      <button id="edit-phone" type="button">Edit Phone</button>
    </div>
    <pre class="summary" id="summary">loading</pre>
    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      const summaryElement = document.getElementById('summary');
      const columns = [
        { id: 'id', header: 'ID', width: 100, type: 'number' },
        { id: 'name', header: 'Name', width: 180, type: 'text' },
        { id: 'email', header: 'Email', width: 260, type: 'text', editable: true },
        { id: 'phone', header: 'Phone', width: 180, type: 'text', editable: true },
        { id: 'status', header: 'Status', width: 160, type: 'text' }
      ];

      const rowData = [
        { id: 1, name: 'Ahn', email: 'ahn.customer@example.com', phone: '010-4422-1100', status: 'active' },
        { id: 2, name: 'Park', email: 'park.ops@example.com', phone: '010-2233-7788', status: 'idle' },
        { id: 3, name: 'Kim', email: 'kim.finance@example.com', phone: '010-8899-1122', status: 'review' }
      ];

      const auditLogs = [];

      function maskValue(columnId, value) {
        if (value == null) {
          return value;
        }
        const text = String(value);
        if (columnId === 'email') {
          const parts = text.split('@');
          const local = parts[0] || '';
          const domain = parts[1] || '';
          return local.slice(0, 2) + '***@' + domain;
        }
        if (columnId === 'phone') {
          const digits = text.replace(/\D/g, '');
          if (digits.length <= 4) {
            return '***' + digits;
          }
          return '***-***-' + digits.slice(-4);
        }
        if (text.length <= 4) {
          return text;
        }
        return text.slice(0, 2) + '***' + text.slice(-2);
      }

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData,
        onAuditLog(payload) {
          auditLogs.unshift({
            schemaVersion: payload.schemaVersion,
            eventName: payload.eventName,
            rowKey: payload.rowKey,
            columnId: payload.columnId,
            source: payload.source,
            transactionId: payload.transactionId,
            maskedPreviousValue: maskValue(payload.columnId, payload.previousValue),
            maskedValue: maskValue(payload.columnId, payload.value)
          });
          auditLogs.splice(5);
          renderSummary();
        },
        height: 420,
        rowHeight: 28,
        overscan: 8
      });

      const renderer = grid.renderer;
      const rootElement = document.getElementById('grid').querySelector('.hgrid');

      function waitForFrame() {
        return new Promise((resolve) => requestAnimationFrame(() => resolve()));
      }

      async function applyCellChange(rowIndex, colIndex, value) {
        grid.setSelection({
          activeCell: { rowIndex, colIndex },
          cellRanges: [{ r1: rowIndex, c1: colIndex, r2: rowIndex, c2: colIndex }]
        });
        await waitForFrame();
        rootElement.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', bubbles: true, cancelable: true }));
        await waitForFrame();
        renderer.editorInputElement.value = value;
        renderer.editorInputElement.dispatchEvent(new Event('input', { bubbles: true }));
        renderer.editorInputElement.dispatchEvent(
          new KeyboardEvent('keydown', { key: 'Enter', bubbles: true, cancelable: true })
        );
        await waitForFrame();
      }

      function getSnapshot() {
        return {
          auditSchemaVersion: HGrid.EDIT_COMMIT_AUDIT_SCHEMA_VERSION,
          auditLogs: auditLogs.slice(),
          rows: rowData.map((row) => ({
            id: row.id,
            email: row.email,
            phone: row.phone,
            status: row.status
          }))
        };
      }

      function renderSummary() {
        summaryElement.textContent = JSON.stringify(getSnapshot(), null, 2);
      }

      document.getElementById('edit-email').addEventListener('click', async () => {
        await applyCellChange(0, 2, 'ahn.updated@example.com');
      });

      document.getElementById('edit-phone').addEventListener('click', async () => {
        await applyCellChange(1, 3, '010-7777-9900');
      });

      renderSummary();

      window.__example91 = {
        getSnapshot,
        applyEmailEdit: () => applyCellChange(0, 2, 'ahn.updated@example.com'),
        applyPhoneEdit: () => applyCellChange(1, 3, '010-7777-9900'),
        renderSummary
      };
    </script>
  </body>
</html>
