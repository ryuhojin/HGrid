<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 5 - Row Model</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      #grid {
        width: 760px;
        margin-top: 12px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        padding: 6px 10px;
        border: 1px solid #b7c3d4;
        background: #f8fafc;
        cursor: pointer;
      }

      #log {
        margin-top: 12px;
        padding: 8px;
        border: 1px solid #d5dbe3;
        background: #fcfdff;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Example 5 - Row Model</h1>
    <div class="controls">
      <button id="set-reverse">setRowOrder(reverse)</button>
      <button id="set-filter">setFilteredRowOrder(top 100)</button>
      <button id="clear-filter">clear filter order</button>
      <button id="reset-order">resetRowOrder()</button>
      <button id="toggle-index">toggle dataToView index</button>
      <button id="show-state">getRowModelState()</button>
    </div>
    <pre id="log">Ready</pre>
    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      const columns = [
        { id: 'id', header: 'ID', width: 100, type: 'number' },
        { id: 'name', header: 'Name', width: 240, type: 'text' },
        { id: 'status', header: 'Status', width: 180, type: 'text' },
        { id: 'updatedAt', header: 'Updated At', width: 220, type: 'date' }
      ];

      const rowData = Array.from({ length: 10000 }, (_, index) => ({
        id: index + 1,
        name: 'Customer-' + (index + 1),
        status: index % 2 === 0 ? 'active' : 'idle',
        updatedAt: new Date(Date.now() - index * 60000).toISOString()
      }));

      const logElement = document.getElementById('log');
      const writeLog = (message) => {
        logElement.textContent = message;
      };

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData,
        rowModelOptions: {
          enableDataToViewIndex: false
        },
        height: 420,
        rowHeight: 28,
        overscan: 8
      });

      let isDataToViewEnabled = false;

      document.getElementById('set-reverse').addEventListener('click', () => {
        const reverseOrder = Array.from({ length: rowData.length }, (_, index) => rowData.length - index - 1);
        grid.setRowOrder(reverseOrder);
        writeLog('setRowOrder(reverse) applied');
      });

      document.getElementById('set-filter').addEventListener('click', () => {
        const topHundred = Array.from({ length: 100 }, (_, index) => index);
        grid.setFilteredRowOrder(topHundred);
        writeLog('setFilteredRowOrder(top 100) applied');
      });

      document.getElementById('clear-filter').addEventListener('click', () => {
        grid.setFilteredRowOrder(null);
        writeLog('setFilteredRowOrder(null) applied');
      });

      document.getElementById('reset-order').addEventListener('click', () => {
        grid.resetRowOrder();
        writeLog('resetRowOrder() applied');
      });

      document.getElementById('toggle-index').addEventListener('click', () => {
        isDataToViewEnabled = !isDataToViewEnabled;
        grid.setRowModelOptions({ enableDataToViewIndex: isDataToViewEnabled });
        writeLog(`setRowModelOptions(enableDataToViewIndex=${isDataToViewEnabled})`);
      });

      document.getElementById('show-state').addEventListener('click', () => {
        writeLog(`getRowModelState() => ${JSON.stringify(grid.getRowModelState())}`);
      });

      grid.on('cellClick', (event) => {
        writeLog(`cellClick view=${event.rowIndex} data=${event.dataIndex} col=${event.columnId}`);
      });
    </script>
  </body>
</html>
