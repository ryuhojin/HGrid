<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 41 - Security CSP Hardening</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: #111827;
        background: #f8fafc;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      p {
        margin: 0 0 10px;
        color: #475569;
        font-size: 13px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .controls button {
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #ffffff;
        color: #0f172a;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .controls button.is-active {
        border-color: #2563eb;
        background: #dbeafe;
        color: #1d4ed8;
      }

      #summary {
        margin: 0 0 10px;
        padding: 10px 12px;
        border: 1px solid #d5dbe3;
        border-radius: 10px;
        background: #ffffff;
        font-size: 12px;
        white-space: pre-wrap;
      }

      #grid {
        width: 980px;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>Example 41 - Security CSP Hardening</h1>
    <p>기본은 secure-by-default다. `unsafeHtml` 컬럼도 sanitizer가 없으면 literal text로 떨어지고, raw HTML은 explicit legacy policy에서만 열린다.</p>

    <div class="controls">
      <button id="strict-sanitize" type="button">strict + sanitize</button>
      <button id="strict-no-sanitize" type="button">strict + no sanitizer</button>
      <button id="legacy-raw" type="button">legacy raw (deprecated)</button>
      <button id="inspect" type="button">inspect</button>
    </div>

    <pre id="summary">Ready</pre>

    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      const summaryElement = document.getElementById('summary');
      const auditLogs = [];
      let mode = 'strict-sanitize';
      const modeButtons = {
        'strict-sanitize': document.getElementById('strict-sanitize'),
        'strict-no-sanitize': document.getElementById('strict-no-sanitize'),
        'legacy-raw': document.getElementById('legacy-raw')
      };

      function strictSanitize(unsafeHtml) {
        return unsafeHtml
          .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '')
          .replace(/<img[\s\S]*?>/gi, '')
          .replace(/\son[a-z]+\s*=\s*(['"]).*?\1/gi, '');
      }

      function resolveSanitizeHook(nextMode) {
        if (nextMode === 'strict-sanitize') {
          return strictSanitize;
        }
        return undefined;
      }

      function resolveUnsafeHtmlPolicy(nextMode) {
        return nextMode === 'legacy-raw' ? 'allowRaw' : 'sanitizedOnly';
      }

      const columns = [
        { id: 'id', header: 'ID', width: 100, type: 'number' },
        { id: 'safeText', header: 'Safe Text (Default)', width: 250, type: 'text' },
        { id: 'unsafeHtml', header: 'Unsafe Html (Opt-in)', width: 330, type: 'text', unsafeHtml: true },
        { id: 'status', header: 'Status', width: 160, type: 'text' }
      ];

      const rowData = Array.from({ length: 600 }, (_, index) => ({
        id: index + 1,
        safeText: index % 2 === 0 ? '<strong>Literal</strong>' : '<img src=x onerror=alert(1)>',
        unsafeHtml:
          index % 3 === 0
            ? '<strong class="safe-mark">Trusted-' + (index + 1) + '</strong>'
            : '<strong class="safe-mark">Trusted-' +
              (index + 1) +
              '</strong><img src=x onerror="window.__hgridXss=true" /><a href="javascript:alert(1)">link</a>',
        status: index % 2 === 0 ? 'active' : 'idle'
      }));

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData,
        htmlRendering: {
          unsafeHtmlPolicy: resolveUnsafeHtmlPolicy(mode)
        },
        sanitizeHtml: resolveSanitizeHook(mode),
        onAuditLog(payload) {
          auditLogs.push(payload);
          if (auditLogs.length > 8) {
            auditLogs.shift();
          }
        },
        height: 420,
        rowHeight: 28,
        overscan: 8
      });

      function getSnapshot() {
        const unsafeCell = document.querySelector('.hgrid__row--center[data-row-index="1"] .hgrid__cell[data-column-id="unsafeHtml"]');
        const safeCell = document.querySelector('.hgrid__row--center[data-row-index="0"] .hgrid__cell[data-column-id="safeText"]');
        const bold = unsafeCell ? unsafeCell.querySelector('strong.safe-mark') : null;
        const img = unsafeCell ? unsafeCell.querySelector('img') : null;

        return {
          mode,
          unsafeHtmlPolicy: resolveUnsafeHtmlPolicy(mode),
          usesSanitizer: typeof resolveSanitizeHook(mode) === 'function',
          safeTextCell: safeCell ? safeCell.textContent : null,
          unsafeHtmlText: unsafeCell ? unsafeCell.textContent : null,
          hasUnsafeBold: Boolean(bold),
          hasUnsafeImage: Boolean(img),
          auditLogCount: auditLogs.length,
          lastAuditLog: auditLogs.length > 0 ? auditLogs[auditLogs.length - 1] : null
        };
      }

      function syncModeButtons() {
        Object.keys(modeButtons).forEach((key) => {
          modeButtons[key].classList.toggle('is-active', key === mode);
        });
      }

      function renderSummary(label) {
        summaryElement.textContent = JSON.stringify({ label, snapshot: getSnapshot() }, null, 2);
      }

      function applyMode(nextMode) {
        mode = nextMode;
        grid.setOptions({
          htmlRendering: {
            unsafeHtmlPolicy: resolveUnsafeHtmlPolicy(mode)
          },
          sanitizeHtml: resolveSanitizeHook(mode)
        });
        syncModeButtons();
      }

      document.getElementById('strict-sanitize').addEventListener('click', () => {
        applyMode('strict-sanitize');
        renderSummary('strict-sanitize');
      });

      document.getElementById('strict-no-sanitize').addEventListener('click', () => {
        applyMode('strict-no-sanitize');
        renderSummary('strict-no-sanitize');
      });

      document.getElementById('legacy-raw').addEventListener('click', () => {
        applyMode('legacy-raw');
        renderSummary('legacy-raw');
      });

      document.getElementById('inspect').addEventListener('click', () => {
        renderSummary('inspect');
      });

      syncModeButtons();
      renderSummary('init');

      window.__example41 = {
        getSnapshot,
        setMode(nextMode) {
          const allowedMode = nextMode === 'legacy-raw' || nextMode === 'strict-no-sanitize' ? nextMode : 'strict-sanitize';
          applyMode(allowedMode);
        }
      };
    </script>
  </body>
</html>
