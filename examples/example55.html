<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 55 - Server-Side Row Model Contract Smoke</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: #0f172a;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      p {
        margin: 0 0 14px;
        color: #475569;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .controls button {
        border: 1px solid #cbd5e1;
        border-radius: 7px;
        background: #f8fafc;
        padding: 7px 11px;
        cursor: pointer;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(760px, 1fr) 420px;
        gap: 16px;
        align-items: start;
      }

      .panel {
        border: 1px solid #dbe3ec;
        background: #fbfdff;
        border-radius: 10px;
        padding: 12px;
      }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 14px;
      }

      .panel pre {
        margin: 0;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      #grid {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>Example 55 - Server-Side Row Model Contract Smoke</h1>
    <p>Remote query envelope(`schemaVersion`, `storeStrategy`, `route`)와 row metadata(`kind`, `childCount`, `aggregateValues`)를 확인하는 예제입니다.</p>

    <div class="controls">
      <button id="root-partial" type="button">root partial</button>
      <button id="root-full" type="button">root full</button>
      <button id="children-full" type="button">children full</button>
      <button id="sort-desc" type="button">sort id desc</button>
      <button id="filter-active" type="button">filter active</button>
      <button id="clear-filter" type="button">clear filter</button>
      <button id="inspect" type="button">inspect</button>
    </div>

    <div class="layout">
      <div id="grid"></div>
      <section class="panel">
        <h2>Contract Snapshot</h2>
        <pre id="log">Ready</pre>
      </section>
    </div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      const TOTAL_ROWS = 1200;
      const BLOCK_SIZE = 120;
      const BASE_TIME = Date.UTC(2026, 1, 1, 0, 0, 0);
      const columns = [
        { id: 'id', header: 'ID', width: 100, type: 'number', pinned: 'left' },
        { id: 'levelLabel', header: 'Level', width: 120, type: 'text' },
        { id: 'name', header: 'Name', width: 240, type: 'text' },
        { id: 'status', header: 'Status', width: 140, type: 'text' },
        { id: 'score', header: 'Score', width: 140, type: 'number' },
        { id: 'updatedAt', header: 'Updated At', width: 220, type: 'date' }
      ];

      let serverRequestCount = 0;
      let lastRequest = null;

      function waitFrame() {
        return new Promise((resolve) => requestAnimationFrame(resolve));
      }

      function getServerSideQuery() {
        return (
          provider.getServerSideQueryModel() || {
            schemaVersion: 'v1',
            requestKind: 'root',
            route: [],
            rootStoreStrategy: 'partial',
            childStoreStrategy: 'partial'
          }
        );
      }

      function getStatusFilterValues(filterModel) {
        const statusFilter = filterModel && filterModel.status;
        if (!statusFilter || typeof statusFilter !== 'object' || statusFilter.type !== 'set' || !Array.isArray(statusFilter.values)) {
          return null;
        }

        return statusFilter.values;
      }

      function getRowStatusBySourceIndex(sourceIndex) {
        return (sourceIndex + 1) % 3 === 0 ? 'active' : 'idle';
      }

      function matchesStatusFilter(sourceIndex, statusValues) {
        if (!statusValues || statusValues.length === 0) {
          return true;
        }

        return statusValues.indexOf(getRowStatusBySourceIndex(sourceIndex)) !== -1;
      }

      function resolveVisibleSourceIndexes(request) {
        const statusValues = getStatusFilterValues(request.queryModel.filterModel);
        const sourceIndexes = [];
        for (let sourceIndex = 0; sourceIndex < TOTAL_ROWS; sourceIndex += 1) {
          if (matchesStatusFilter(sourceIndex, statusValues)) {
            sourceIndexes.push(sourceIndex);
          }
        }

        if (request.queryModel.sortModel.length > 0 && request.queryModel.sortModel[0].direction === 'desc') {
          sourceIndexes.reverse();
        }

        return sourceIndexes;
      }

      function buildRouteLabel(route) {
        if (!Array.isArray(route) || route.length === 0) {
          return 'root';
        }

        return route
          .map((segment) => `${segment.columnId}:${segment.key}`)
          .join(' > ');
      }

      function buildRow(sourceIndex, request) {
        const serverSide = request.queryModel.serverSide;
        const routeLabel = buildRouteLabel(serverSide && serverSide.route);
        const requestKind = serverSide ? serverSide.requestKind : 'root';
        const id = sourceIndex + 1;
        return {
          id,
          levelLabel: requestKind === 'children' ? 'child-store' : 'root-store',
          name: `${routeLabel} / Row ${String(id).padStart(4, '0')}`,
          status: getRowStatusBySourceIndex(sourceIndex),
          score: (id * 17) % 1000,
          updatedAt: new Date(BASE_TIME - sourceIndex * 60000).toISOString()
        };
      }

      function buildMetadata(visibleIndex, request) {
        const serverSide = request.queryModel.serverSide;
        const route = serverSide ? serverSide.route : [];
        if (visibleIndex === request.startIndex) {
          return {
            kind: 'group',
            level: Array.isArray(route) ? route.length : 0,
            childCount: 24,
            isExpandedByDefault: true,
            groupColumnId: route.length > 0 ? route[route.length - 1].columnId : 'region',
            groupKey: route.length > 0 ? route[route.length - 1].key : 'ROOT',
            route,
            aggregateValues: {
              totalScore: 2400
            }
          };
        }

        if (visibleIndex === request.startIndex + 1) {
          return {
            kind: 'aggregate',
            level: Array.isArray(route) ? route.length : 0,
            route,
            aggregateValues: {
              count: 24,
              avgScore: 420
            }
          };
        }

        return {
          kind: 'leaf',
          level: (Array.isArray(route) ? route.length : 0) + 1,
          route
        };
      }

      const dataSource = {
        fetchBlock(request) {
          serverRequestCount += 1;
          lastRequest = JSON.parse(JSON.stringify({
            startIndex: request.startIndex,
            endIndex: request.endIndex,
            operationId: request.operationId,
            queryModel: request.queryModel
          }));

          const visibleSourceIndexes = resolveVisibleSourceIndexes(request);
          const startIndex = Math.max(0, Math.min(visibleSourceIndexes.length, request.startIndex));
          const endIndex = Math.max(startIndex, Math.min(visibleSourceIndexes.length, request.endIndex));
          const rows = [];
          const rowMetadata = [];
          for (let visibleIndex = startIndex; visibleIndex < endIndex; visibleIndex += 1) {
            const sourceIndex = visibleSourceIndexes[visibleIndex];
            rows.push(buildRow(sourceIndex, request));
            rowMetadata.push(buildMetadata(visibleIndex, request));
          }

          return new Promise((resolve) => {
            setTimeout(() => {
              resolve({
                rows,
                rowMetadata,
                totalRowCount: visibleSourceIndexes.length
              });
            }, 18);
          });
        }
      };

      const provider = new HGrid.RemoteDataProvider({
        dataSource,
        rowCount: TOTAL_ROWS,
        cache: {
          blockSize: BLOCK_SIZE,
          maxBlocks: 6,
          prefetchBlocks: 1
        },
        queryModel: {
          serverSide: {
            schemaVersion: 'v2',
            requestKind: 'root',
            route: [],
            rootStoreStrategy: 'partial',
            childStoreStrategy: 'partial'
          }
        }
      });

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        dataProvider: provider,
        grouping: {
          mode: 'server',
          groupModel: [{ columnId: 'status' }]
        },
        height: 420,
        rowHeight: 28,
        overscan: 6
      });

      const logElement = document.getElementById('log');

      function getSnapshot() {
        const firstIdCell =
          document.querySelector('.hgrid__row--left .hgrid__cell[data-column-id="id"]') ||
          document.querySelector('.hgrid__row--center .hgrid__cell[data-column-id="id"]');
        const firstId = firstIdCell ? Number(firstIdCell.textContent || '') : null;
        const firstMetadata = provider.getRowMetadata(0);

        return {
          serverRequestCount,
          firstVisibleId: Number.isFinite(firstId) ? firstId : null,
          queryModel: provider.getQueryModel(),
          serverSideQueryModel: provider.getServerSideQueryModel(),
          firstRowMetadata: firstMetadata,
          debugState: provider.getDebugState(),
          lastRequest
        };
      }

      function writeSnapshot(label) {
        logElement.textContent = JSON.stringify(
          {
            label,
            snapshot: getSnapshot()
          },
          null,
          2
        );
      }

      async function applyServerSideQuery(nextQuery) {
        provider.setServerSideQueryModel(nextQuery);
        await waitFrame();
        writeSnapshot('server-side-query');
      }

      document.getElementById('root-partial').addEventListener('click', async () => {
        await applyServerSideQuery({
          schemaVersion: 'v2',
          requestKind: 'root',
          route: [],
          rootStoreStrategy: 'partial',
          childStoreStrategy: 'partial'
        });
      });

      document.getElementById('root-full').addEventListener('click', async () => {
        await applyServerSideQuery({
          schemaVersion: 'v2',
          requestKind: 'root',
          route: [],
          rootStoreStrategy: 'full',
          childStoreStrategy: 'full'
        });
      });

      document.getElementById('children-full').addEventListener('click', async () => {
        await applyServerSideQuery({
          schemaVersion: 'v2',
          requestKind: 'children',
          route: [
            { columnId: 'region', key: 'APAC' },
            { columnId: 'country', key: 'KR' }
          ],
          rootStoreStrategy: 'partial',
          childStoreStrategy: 'full'
        });
      });

      document.getElementById('sort-desc').addEventListener('click', async () => {
        await grid.setSortModel([{ columnId: 'id', direction: 'desc' }]);
        await waitFrame();
        writeSnapshot('sort-desc');
      });

      document.getElementById('filter-active').addEventListener('click', async () => {
        await grid.setFilterModel({
          status: {
            type: 'set',
            values: ['active']
          }
        });
        await waitFrame();
        writeSnapshot('filter-active');
      });

      document.getElementById('clear-filter').addEventListener('click', async () => {
        await grid.setFilterModel({});
        await waitFrame();
        writeSnapshot('clear-filter');
      });

      document.getElementById('inspect').addEventListener('click', () => {
        writeSnapshot('inspect');
      });

      window.__example55 = {
        grid,
        provider,
        getSnapshot
      };

      setTimeout(() => {
        writeSnapshot('initial');
      }, 40);
    </script>
  </body>
</html>
