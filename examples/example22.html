<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 22 - Worker Filtering</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: #0f172a;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .controls button {
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
      }

      .controls button:disabled {
        cursor: default;
        opacity: 0.55;
      }

      #log {
        margin-bottom: 12px;
        padding: 10px 12px;
        border: 1px solid #d5dbe3;
        background: #fcfdff;
        font-size: 12px;
        white-space: pre-wrap;
      }

      #grid {
        width: 1120px;
      }
    </style>
  </head>
  <body>
    <h1>Example 22 - Worker Filtering</h1>
    <div class="controls">
      <button id="filter-text" type="button">filter text contains</button>
      <button id="filter-number" type="button">filter number range</button>
      <button id="filter-date" type="button">filter date between</button>
      <button id="filter-set" type="button">filter set region</button>
      <button id="filter-combined" type="button">filter combined</button>
      <button id="clear-filter" type="button">clear filter</button>
      <button id="swap-1m" type="button">swap synthetic 1M</button>
      <button id="filter-1m" type="button">filter synthetic 1M</button>
      <button id="inspect" type="button">inspect</button>
    </div>
    <pre id="log">Ready</pre>
    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      class SyntheticLargeDataProvider {
        constructor(rowCount) {
          this.rowCount = rowCount;
        }

        getRowCount() {
          return this.rowCount;
        }

        getRowKey(dataIndex) {
          return dataIndex;
        }

        getValue(dataIndex, columnId) {
          if (columnId === 'id') {
            return dataIndex + 1;
          }
          if (columnId === 'name') {
            return 'Customer-' + (dataIndex + 1);
          }
          if (columnId === 'score') {
            return (dataIndex * 17) % 1000;
          }
          if (columnId === 'dueDate') {
            const day = (dataIndex % 28) + 1;
            return '2026-03-' + String(day).padStart(2, '0');
          }
          if (columnId === 'region') {
            return ['KR', 'US', 'JP', 'DE'][dataIndex % 4];
          }
          return null;
        }

        setValue() {}

        applyTransactions() {}

        getRow(dataIndex) {
          return {
            id: dataIndex + 1,
            name: 'Customer-' + (dataIndex + 1),
            score: (dataIndex * 17) % 1000,
            dueDate: '2026-03-' + String((dataIndex % 28) + 1).padStart(2, '0'),
            region: ['KR', 'US', 'JP', 'DE'][dataIndex % 4]
          };
        }
      }

      const columns = [
        { id: 'id', header: 'ID', width: 110, type: 'number', pinned: 'left' },
        { id: 'name', header: 'Name', width: 240, type: 'text' },
        { id: 'score', header: 'Score', width: 180, type: 'number' },
        { id: 'dueDate', header: 'Due Date', width: 180, type: 'date' },
        { id: 'region', header: 'Region', width: 140, type: 'text', pinned: 'right' }
      ];

      const rowData = Array.from({ length: 6000 }, (_, index) => ({
        id: index + 1,
        name: index % 7 === 0 ? 'Alpha-' + (index + 1) : 'Customer-' + (index + 1),
        score: (index * 29) % 1000,
        dueDate: '2026-03-' + String((index % 28) + 1).padStart(2, '0'),
        region: ['KR', 'US', 'JP', 'DE'][index % 4]
      }));

      const logElement = document.getElementById('log');
      const buttons = Array.from(document.querySelectorAll('.controls button'));
      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData,
        height: 420,
        rowHeight: 28,
        overscan: 6,
        overscanCols: 2,
        workerRuntime: {
          assetBaseUrl: '../packages/grid-core/dist',
          timeoutMs: 180000
        }
      });

      let isSynthetic = false;
      let running = false;

      function setBusy(isBusy) {
        running = isBusy;
        for (const button of buttons) {
          if (button.id === 'inspect') {
            continue;
          }
          button.disabled = isBusy;
        }
      }

      function getRenderedCellText(rowIndex, columnId) {
        const cell = document.querySelector(
          '.hgrid__row[data-row-index="' + rowIndex + '"] .hgrid__cell[data-column-id="' + columnId + '"]'
        );
        return cell ? cell.textContent : null;
      }

      function snapshot(label, extra) {
        logElement.textContent = JSON.stringify({
          label,
          snapshot: {
            running,
            isSynthetic,
            filterModel: grid.getFilterModel(),
            sortModel: grid.getSortModel(),
            topRows: {
              r0: {
                id: Number(getRenderedCellText(0, 'id')),
                name: getRenderedCellText(0, 'name'),
                score: Number(getRenderedCellText(0, 'score')),
                dueDate: getRenderedCellText(0, 'dueDate'),
                region: getRenderedCellText(0, 'region')
              },
              r1: {
                id: Number(getRenderedCellText(1, 'id')),
                name: getRenderedCellText(1, 'name'),
                score: Number(getRenderedCellText(1, 'score')),
                dueDate: getRenderedCellText(1, 'dueDate'),
                region: getRenderedCellText(1, 'region')
              }
            }
          },
          extra: extra || null
        });
      }

      async function runFilter(label, filterModel) {
        setBusy(true);
        const start = performance.now();
        try {
          await grid.setFilterModel(filterModel);
        } catch (error) {
          snapshot(label + '-error', {
            message: error && error.message ? error.message : String(error)
          });
          setBusy(false);
          return;
        }
        setBusy(false);
        snapshot(label, {
          elapsedMs: Math.round(performance.now() - start)
        });
      }

      document.getElementById('filter-text').addEventListener('click', () => {
        runFilter('filter-text', {
          name: { kind: 'text', operator: 'contains', value: 'alpha', caseSensitive: false }
        });
      });

      document.getElementById('filter-number').addEventListener('click', () => {
        runFilter('filter-number', {
          score: { kind: 'number', operator: 'between', min: 200, max: 400 }
        });
      });

      document.getElementById('filter-date').addEventListener('click', () => {
        runFilter('filter-date', {
          dueDate: { kind: 'date', operator: 'between', min: '2026-03-08', max: '2026-03-12' }
        });
      });

      document.getElementById('filter-set').addEventListener('click', () => {
        runFilter('filter-set', {
          region: { kind: 'set', values: ['KR', 'JP'] }
        });
      });

      document.getElementById('filter-combined').addEventListener('click', () => {
        runFilter('filter-combined', {
          name: { kind: 'text', operator: 'contains', value: 'customer-1', caseSensitive: false },
          score: { kind: 'number', operator: 'gte', value: 100 },
          region: { kind: 'set', values: ['US', 'DE'] }
        });
      });

      document.getElementById('clear-filter').addEventListener('click', async () => {
        setBusy(true);
        await grid.clearFilterModel();
        setBusy(false);
        snapshot('clear-filter');
      });

      document.getElementById('swap-1m').addEventListener('click', () => {
        grid.setOptions({ dataProvider: new SyntheticLargeDataProvider(1_000_000) });
        isSynthetic = true;
        snapshot('swap-1m');
      });

      document.getElementById('filter-1m').addEventListener('click', () => {
        if (!isSynthetic) {
          snapshot('filter-1m-skipped', { reason: 'swap synthetic first' });
          return;
        }

        runFilter('filter-1m', {
          score: { kind: 'number', operator: 'between', min: 300, max: 900 },
          region: { kind: 'set', values: ['KR', 'US'] },
          dueDate: { kind: 'date', operator: 'between', min: '2026-03-05', max: '2026-03-22' }
        });
      });

      document.getElementById('inspect').addEventListener('click', () => {
        snapshot('inspect');
      });

      snapshot('initial');
    </script>
  </body>
</html>
