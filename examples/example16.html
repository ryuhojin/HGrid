<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 16 - Event Delegation Hit Test</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: #111827;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .controls button {
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        color: #0f172a;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 13px;
        cursor: pointer;
      }

      #log {
        margin-bottom: 12px;
        border: 1px solid #e2e8f0;
        background: #fcfdff;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 12px;
        line-height: 1.4;
      }

      #grid {
        width: 980px;
      }
    </style>
  </head>
  <body>
    <h1>Example 16 - Event Delegation Hit Test</h1>

    <div class="controls">
      <button id="probe-left" type="button">probe left</button>
      <button id="probe-center-c0" type="button">probe center c0</button>
      <button id="probe-center-c5" type="button">probe center c5</button>
      <button id="probe-right" type="button">probe right</button>
      <button id="header-wheel" type="button">header wheel x+y</button>
      <button id="pinned-wheel-x" type="button">pinned wheel x-only</button>
      <button id="pinned-wheel-y" type="button">pinned wheel y-only</button>
      <button id="burst-wheel" type="button">burst wheel</button>
      <button id="inspect" type="button">inspect</button>
    </div>

    <pre id="log">Ready</pre>
    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      const centerColumns = Array.from({ length: 20 }, (_, index) => ({
        id: 'c' + index,
        header: 'C' + index,
        width: 120,
        type: 'text'
      }));

      const columns = [
        { id: 'id', header: 'ID', width: 110, type: 'number', pinned: 'left' },
        ...centerColumns,
        { id: 'status', header: 'Status', width: 130, type: 'text', pinned: 'right' }
      ];

      const rowData = Array.from({ length: 5000 }, (_, rowIndex) => {
        const row = {
          id: rowIndex + 1,
          status: rowIndex % 2 === 0 ? 'active' : 'idle'
        };

        for (let colIndex = 0; colIndex < centerColumns.length; colIndex += 1) {
          row['c' + colIndex] = 'r' + (rowIndex + 1) + '-c' + colIndex;
        }

        return row;
      });

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData,
        height: 420,
        rowHeight: 28,
        overscan: 6,
        overscanCols: 2
      });

      const logElement = document.getElementById('log');
      let lastCellClick = null;

      grid.on('cellClick', (event) => {
        lastCellClick = {
          rowIndex: event.rowIndex,
          dataIndex: event.dataIndex,
          columnId: event.columnId,
          value: String(event.value)
        };
      });

      function waitFrame() {
        return new Promise((resolve) => requestAnimationFrame(() => resolve()));
      }

      function getSnapshot() {
        const horizontalScroll = document.querySelector('.hgrid__h-scroll');
        const verticalScroll = document.querySelector('.hgrid__v-scroll') || document.querySelector('.hgrid__viewport');
        const firstVisibleRow = document.querySelector('.hgrid__row--left');

        return {
          hScrollLeft: horizontalScroll ? horizontalScroll.scrollLeft : 0,
          vScrollTopNative: verticalScroll ? verticalScroll.scrollTop : 0,
          vScrollTopVirtual: Math.round(grid.getState().scrollTop),
          firstVisibleRowIndex: firstVisibleRow ? Number(firstVisibleRow.dataset.rowIndex) : -1,
          firstVisibleDataIndex: firstVisibleRow ? Number(firstVisibleRow.dataset.dataIndex) : -1,
          lastCellClick
        };
      }

      function writeLog(payload) {
        logElement.textContent = JSON.stringify(payload);
      }

      function dispatchPointerAt(clientX, clientY) {
        const root = document.querySelector('.hgrid');
        root.dispatchEvent(
          new PointerEvent('pointerdown', {
            bubbles: true,
            cancelable: true,
            pointerType: 'mouse',
            button: 0,
            clientX,
            clientY
          })
        );
      }

      async function runProbe(label, resolver) {
        lastCellClick = null;
        const point = resolver();
        dispatchPointerAt(point.x, point.y);
        await waitFrame();
        writeLog({
          label,
          point,
          snapshot: getSnapshot()
        });
      }

      function resolveProbePoint(zone, centerOffsetX) {
        const bodyRect = document.querySelector('.hgrid__body').getBoundingClientRect();
        const leftRect = document.querySelector('.hgrid__body-left').getBoundingClientRect();
        const rightRect = document.querySelector('.hgrid__body-right').getBoundingClientRect();
        const y = bodyRect.top + 56;

        if (zone === 'left') {
          return { x: leftRect.left + leftRect.width * 0.5, y };
        }

        if (zone === 'right') {
          return { x: rightRect.left + rightRect.width * 0.5, y };
        }

        return { x: leftRect.right + centerOffsetX, y };
      }

      async function runWheel(label, targetSelector, deltaX, deltaY) {
        const target = document.querySelector(targetSelector);
        if (!target) {
          writeLog({ label: label + '-error', error: 'missing target ' + targetSelector });
          return;
        }

        const before = getSnapshot();
        target.dispatchEvent(
          new WheelEvent('wheel', {
            deltaX,
            deltaY,
            bubbles: true,
            cancelable: true
          })
        );
        await waitFrame();
        await waitFrame();

        writeLog({
          label,
          before,
          after: getSnapshot()
        });
      }

      document.getElementById('probe-left').addEventListener('click', () => {
        runProbe('probe-left', () => resolveProbePoint('left', 0));
      });

      document.getElementById('probe-center-c0').addEventListener('click', () => {
        runProbe('probe-center-c0', () => resolveProbePoint('center', 60));
      });

      document.getElementById('probe-center-c5').addEventListener('click', async () => {
        const horizontalScroll = document.querySelector('.hgrid__h-scroll');
        if (horizontalScroll) {
          horizontalScroll.scrollLeft = 0;
          horizontalScroll.dispatchEvent(new Event('scroll'));
          await waitFrame();
        }

        runProbe('probe-center-c5', () => resolveProbePoint('center', 5 * 120 + 60));
      });

      document.getElementById('probe-right').addEventListener('click', () => {
        runProbe('probe-right', () => resolveProbePoint('right', 0));
      });

      document.getElementById('header-wheel').addEventListener('click', () => {
        runWheel('header-wheel', '.hgrid__header', 240, 220);
      });

      document.getElementById('pinned-wheel-x').addEventListener('click', async () => {
        const horizontalScroll = document.querySelector('.hgrid__h-scroll');
        if (horizontalScroll) {
          horizontalScroll.scrollLeft = 260;
          horizontalScroll.dispatchEvent(new Event('scroll'));
          await waitFrame();
        }

        runWheel('pinned-wheel-x', '.hgrid__body-left', 260, 0);
      });

      document.getElementById('pinned-wheel-y').addEventListener('click', () => {
        runWheel('pinned-wheel-y', '.hgrid__body-left', 0, 240);
      });

      document.getElementById('burst-wheel').addEventListener('click', async () => {
        const target = document.querySelector('.hgrid__header');
        if (!target) {
          writeLog({ label: 'burst-wheel-error', error: 'missing header' });
          return;
        }

        const before = getSnapshot();
        for (let index = 0; index < 40; index += 1) {
          target.dispatchEvent(
            new WheelEvent('wheel', {
              deltaX: 0,
              deltaY: 18,
              bubbles: true,
              cancelable: true
            })
          );
        }
        await waitFrame();
        await waitFrame();
        await waitFrame();

        writeLog({
          label: 'burst-wheel',
          before,
          after: getSnapshot()
        });
      });

      document.getElementById('inspect').addEventListener('click', () => {
        writeLog({
          label: 'inspect',
          snapshot: getSnapshot()
        });
      });

      writeLog({
        label: 'initial',
        snapshot: getSnapshot()
      });
    </script>
  </body>
</html>
