<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 82 - Status Bar Large Aggregate Async</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #f4f7fb;
        color: #1f2937;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #475569;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(720px, 1fr) 320px;
        gap: 18px;
        margin-top: 18px;
      }

      .surface {
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
      }

      .workspace {
        padding: 18px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      button {
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 999px;
        background: white;
        color: #0f172a;
        font: inherit;
        padding: 8px 14px;
        cursor: pointer;
      }

      #grid {
        width: 100%;
        min-width: 720px;
      }

      .panel {
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .metric {
        padding: 12px 14px;
        border-radius: 16px;
        background: #f8fafc;
        border: 1px solid rgba(148, 163, 184, 0.18);
      }

      .metric strong {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #475569;
      }

      .metric code {
        display: block;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 12px;
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <h1>Example 82 - Status Bar Large Aggregate Async</h1>
    <p>큰 selection aggregate를 청크 계산으로 처리하면서 status bar가 계산중 상태를 보여주는 예제입니다.</p>

    <div class="layout">
      <section class="surface workspace">
        <div class="toolbar">
          <button id="selectSmallRange">Select Small Range</button>
          <button id="selectLargeRange">Select Large Range</button>
        </div>
        <div id="grid"></div>
      </section>

      <aside class="surface panel">
        <div class="metric">
          <strong>Selection</strong>
          <code id="selectionText">-</code>
        </div>
        <div class="metric">
          <strong>Aggregates</strong>
          <code id="aggregatesText">-</code>
        </div>
        <div class="metric">
          <strong>Rows</strong>
          <code id="rowsText">-</code>
        </div>
      </aside>
    </div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      const columns = [
        { id: 'id', header: 'ID', width: 90, type: 'number' },
        { id: 'sales', header: 'Sales', width: 140, type: 'number' },
        { id: 'margin', header: 'Margin', width: 140, type: 'number' },
        { id: 'cost', header: 'Cost', width: 140, type: 'number' }
      ];

      const rowData = Array.from({ length: 80 }, (_, index) => ({
        id: index + 1,
        sales: index + 1,
        margin: (index + 1) * 2,
        cost: (index + 1) * 3
      }));

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData,
        height: 360,
        rowHeight: 32,
        overscan: 4,
        statusBar: {
          enabled: true,
          aggregateAsyncThreshold: 24,
          aggregateChunkSize: 12
        }
      });

      function getStatusBarText(itemId) {
        const element = document.querySelector(`[data-status-bar-item="${itemId}"]`);
        return element ? element.textContent.trim() : '';
      }

      function getSnapshot() {
        return {
          selection: grid.getSelection().cellRanges[0] || null,
          selectionText: getStatusBarText('selection'),
          aggregatesText: getStatusBarText('aggregates'),
          rowsText: getStatusBarText('rows')
        };
      }

      function renderSnapshot() {
        const snapshot = getSnapshot();
        document.getElementById('selectionText').textContent = snapshot.selectionText || '-';
        document.getElementById('aggregatesText').textContent = snapshot.aggregatesText || '-';
        document.getElementById('rowsText').textContent = snapshot.rowsText || '-';
      }

      function afterSelectionChange() {
        requestAnimationFrame(() => requestAnimationFrame(renderSnapshot));
      }

      document.getElementById('selectSmallRange').addEventListener('click', () => {
        grid.setSelection({
          activeCell: { rowIndex: 1, colIndex: 1 },
          cellRanges: [{ r1: 0, c1: 1, r2: 1, c2: 2 }]
        });
        afterSelectionChange();
      });

      document.getElementById('selectLargeRange').addEventListener('click', () => {
        grid.setSelection({
          activeCell: { rowIndex: 19, colIndex: 3 },
          cellRanges: [{ r1: 0, c1: 1, r2: 19, c2: 3 }]
        });
        renderSnapshot();
        afterSelectionChange();
      });

      renderSnapshot();

      window.__example82 = {
        getSnapshot,
        selectSmallRange() {
          document.getElementById('selectSmallRange').click();
        },
        selectLargeRange() {
          document.getElementById('selectLargeRange').click();
        }
      };
    </script>
  </body>
</html>
