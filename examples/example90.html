<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 90 - Trusted Types HTML Rendering</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: #111827;
        background: #f8fafc;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      p {
        margin: 0 0 14px;
        color: #475569;
        font-size: 13px;
      }

      .summary {
        margin: 0 0 12px;
        padding: 12px 14px;
        border: 1px solid #d7dee8;
        border-radius: 12px;
        background: #ffffff;
        font-size: 12px;
        white-space: pre-wrap;
      }

      #grid {
        width: 920px;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>Example 90 - Trusted Types HTML Rendering</h1>
    <p>`trustedTypesPolicyName`을 주면 HTML sink는 해당 policy를 통해 작성된다. 이 예제는 secure-by-default + sanitizer + TT policy name 조합을 보여준다.</p>
    <pre class="summary" id="summary">loading</pre>
    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      function strictSanitize(unsafeHtml) {
        return unsafeHtml
          .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '')
          .replace(/<img[\s\S]*?>/gi, '')
          .replace(/\son[a-z]+\s*=\s*(['"]).*?\1/gi, '')
          .replace(/javascript:/gi, '');
      }

      const columns = [
        { id: 'id', header: 'ID', width: 100, type: 'number' },
        { id: 'name', header: 'Name', width: 220, type: 'text' },
        { id: 'profileHtml', header: 'Profile Html', width: 360, type: 'text', unsafeHtml: true },
        { id: 'status', header: 'Status', width: 180, type: 'text' }
      ];

      const rowData = Array.from({ length: 60 }, (_, index) => ({
        id: index + 1,
        name: 'Customer-' + (index + 1),
        profileHtml:
          '<strong class="profile-mark">Trusted-' +
          (index + 1) +
          '</strong><img src=x onerror="window.__ttXss=true" /><a href="javascript:alert(1)">link</a>',
        status: index % 2 === 0 ? 'active' : 'idle',
      }));

      const summaryElement = document.getElementById('summary');
      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData,
        htmlRendering: {
          unsafeHtmlPolicy: 'sanitizedOnly',
          trustedTypesPolicyName: 'hgrid-example90'
        },
        sanitizeHtml: strictSanitize,
        height: 420,
        rowHeight: 28,
        overscan: 8
      });

      function getSnapshot() {
        const cell = document.querySelector('.hgrid__row--center[data-row-index="0"] .hgrid__cell[data-column-id="profileHtml"]');
        return {
          trustedTypesAvailable: typeof window.trustedTypes !== 'undefined',
          policyName: 'hgrid-example90',
          hasStrong: Boolean(cell && cell.querySelector('strong.profile-mark')),
          hasImage: Boolean(cell && cell.querySelector('img')),
          hasLink: Boolean(cell && cell.querySelector('a')),
          text: cell ? cell.textContent : null
        };
      }

      function renderSummary() {
        summaryElement.textContent = JSON.stringify(getSnapshot(), null, 2);
      }

      renderSummary();

      window.__example90 = {
        getSnapshot,
        renderSummary
      };
    </script>
  </body>
</html>
