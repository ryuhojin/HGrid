<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 35 - CSV TSV Export</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: #111827;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .controls button {
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #f8fafc;
        color: #0f172a;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .status {
        margin: 0 0 10px;
        padding: 10px 12px;
        border: 1px solid #d5dbe3;
        background: #fcfdff;
        font-size: 12px;
        display: grid;
        gap: 6px;
      }

      .progress {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: #e2e8f0;
        overflow: hidden;
      }

      .progress__bar {
        width: 0%;
        height: 100%;
        background: #2563eb;
        transition: width 120ms linear;
      }

      #preview {
        margin: 0 0 10px;
        padding: 10px 12px;
        border: 1px solid #d5dbe3;
        background: #fcfdff;
        font-size: 12px;
        white-space: pre-wrap;
      }

      #log {
        margin: 0 0 12px;
        padding: 10px 12px;
        border: 1px solid #d5dbe3;
        background: #fcfdff;
        font-size: 12px;
        white-space: pre-wrap;
      }

      #grid {
        width: 1080px;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>Example 35 - CSV TSV Export</h1>
    <div class="controls">
      <button id="select-range" type="button">select B11:C15</button>
      <button id="export-visible-csv" type="button">export visible CSV</button>
      <button id="export-selection-tsv" type="button">export selection TSV</button>
      <button id="export-all-csv" type="button">export all CSV</button>
      <button id="cancel-export" type="button">cancel all export</button>
      <button id="inspect" type="button">inspect</button>
    </div>
    <div class="status">
      <div id="status-text">idle</div>
      <div class="progress"><div id="progress-bar" class="progress__bar"></div></div>
    </div>
    <pre id="preview">No export result yet.</pre>
    <pre id="log">Ready</pre>
    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      function waitFrame() {
        return new Promise((resolve) => requestAnimationFrame(() => resolve()));
      }

      const columns = [
        { id: 'id', header: 'ID', width: 100, type: 'number' },
        { id: 'name', header: 'Name', width: 220, type: 'text' },
        { id: 'status', header: 'Status', width: 140, type: 'text' },
        { id: 'region', header: 'Region', width: 120, type: 'text' },
        { id: 'score', header: 'Score', width: 120, type: 'number' },
        { id: 'updatedAt', header: 'Updated At', width: 240, type: 'date' }
      ];

      const regions = ['KR', 'US', 'JP', 'DE', 'SG'];
      const rowData = Array.from({ length: 30000 }, (_, index) => ({
        id: index + 1,
        name: 'Customer-' + (index + 1),
        status: index % 2 === 0 ? 'active' : 'idle',
        region: regions[index % regions.length],
        score: (index * 19) % 1000,
        updatedAt: new Date(Date.now() - index * 60000).toISOString()
      }));

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData,
        height: 420,
        rowHeight: 28,
        overscan: 8,
        overscanCols: 2
      });

      const statusTextElement = document.getElementById('status-text');
      const progressBarElement = document.getElementById('progress-bar');
      const previewElement = document.getElementById('preview');
      const logElement = document.getElementById('log');

      let activeExportController = null;
      let progressSnapshot = {
        status: 'idle',
        processedRows: 0,
        totalRows: 0,
        progress: 0
      };
      let lastExportResult = null;

      function updateProgressSnapshot(progressEvent) {
        progressSnapshot = {
          status: progressEvent.status,
          processedRows: progressEvent.processedRows,
          totalRows: progressEvent.totalRows,
          progress: progressEvent.progress
        };
        statusTextElement.textContent =
          progressEvent.status +
          ' | ' +
          progressEvent.processedRows +
          ' / ' +
          progressEvent.totalRows +
          ' rows';
        progressBarElement.style.width = Math.round(Math.max(0, Math.min(1, progressEvent.progress)) * 100) + '%';
      }

      function setIdleStatus() {
        progressSnapshot = {
          status: 'idle',
          processedRows: 0,
          totalRows: 0,
          progress: 0
        };
        statusTextElement.textContent = 'idle';
        progressBarElement.style.width = '0%';
      }

      function renderPreview(content) {
        const lines = content.split('\n').slice(0, 8);
        previewElement.textContent = lines.join('\n');
      }

      function readCell(rowIndex, columnId) {
        const selector = '.hgrid__row[data-row-index=\"' + rowIndex + '\"] .hgrid__cell[data-column-id=\"' + columnId + '\"]';
        const cell = document.querySelector(selector);
        return cell && typeof cell.textContent === 'string' ? cell.textContent.trim() : '';
      }

      function getSnapshot() {
        return {
          selection: grid.getSelection(),
          progress: progressSnapshot,
          lastExportResult: lastExportResult
            ? {
                operationId: lastExportResult.operationId,
                format: lastExportResult.format,
                scope: lastExportResult.scope,
                rowCount: lastExportResult.rowCount,
                canceled: lastExportResult.canceled
              }
            : null,
          row10: {
            id: readCell(9, 'id'),
            name: readCell(9, 'name'),
            status: readCell(9, 'status')
          },
          row11: {
            id: readCell(10, 'id'),
            name: readCell(10, 'name'),
            status: readCell(10, 'status')
          },
          preview: previewElement.textContent
        };
      }

      function writeLog(label, extra) {
        logElement.textContent = JSON.stringify(
          {
            label,
            snapshot: getSnapshot(),
            extra: extra || null
          },
          null,
          2
        );
      }

      function selectDemoRange() {
        grid.setSelection({
          activeCell: { rowIndex: 10, colIndex: 1 },
          cellRanges: [{ r1: 10, c1: 1, r2: 14, c2: 2 }],
          rowRanges: []
        });
      }

      async function exportVisibleCsv() {
        setIdleStatus();
        const result = await grid.exportCsv({ scope: 'visible' });
        lastExportResult = result;
        renderPreview(result.content);
        return result;
      }

      async function exportSelectionTsv() {
        const result = await grid.exportTsv({
          scope: 'selection',
          includeHeaders: false
        });
        lastExportResult = result;
        renderPreview(result.content);
        return result;
      }

      async function exportAllCsvWithProgress(controller, shouldAutoCancel) {
        const signal = controller.signal;
        const result = await grid.exportCsv({
          scope: 'all',
          chunkSize: 500,
          signal,
          onProgress(progressEvent) {
            updateProgressSnapshot(progressEvent);
            if (
              shouldAutoCancel === true &&
              progressEvent.status === 'running' &&
              progressEvent.processedRows >= 2000 &&
              signal.aborted !== true
            ) {
              controller.abort();
            }
          }
        });
        lastExportResult = result;
        renderPreview(result.content);
        return result;
      }

      async function startAllExport() {
        if (activeExportController) {
          activeExportController.abort();
        }
        const controller = new AbortController();
        activeExportController = controller;
        setIdleStatus();
        const result = await exportAllCsvWithProgress(controller, false);
        activeExportController = null;
        return result;
      }

      function cancelAllExport() {
        if (!activeExportController) {
          return false;
        }
        activeExportController.abort();
        return true;
      }

      async function runCancelableAllExport() {
        if (activeExportController) {
          activeExportController.abort();
        }
        const controller = new AbortController();
        activeExportController = controller;
        setIdleStatus();
        const result = await exportAllCsvWithProgress(controller, true);
        activeExportController = null;
        return {
          result,
          progress: progressSnapshot
        };
      }

      document.getElementById('select-range').addEventListener('click', () => {
        selectDemoRange();
        writeLog('select-range');
      });

      document.getElementById('export-visible-csv').addEventListener('click', async () => {
        const result = await exportVisibleCsv();
        writeLog('export-visible-csv', {
          rowCount: result.rowCount,
          canceled: result.canceled
        });
      });

      document.getElementById('export-selection-tsv').addEventListener('click', async () => {
        const result = await exportSelectionTsv();
        writeLog('export-selection-tsv', {
          rowCount: result.rowCount,
          canceled: result.canceled
        });
      });

      document.getElementById('export-all-csv').addEventListener('click', async () => {
        const result = await startAllExport();
        writeLog('export-all-csv', {
          rowCount: result.rowCount,
          canceled: result.canceled
        });
      });

      document.getElementById('cancel-export').addEventListener('click', () => {
        const canceled = cancelAllExport();
        writeLog('cancel-export', { canceled });
      });

      document.getElementById('inspect').addEventListener('click', () => {
        writeLog('inspect');
      });

      selectDemoRange();
      writeLog('ready');

      window.__example35 = {
        getSnapshot,
        selectDemoRange,
        exportVisibleCsv,
        exportSelectionTsv,
        startAllExport,
        cancelAllExport,
        runCancelableAllExport
      };
    </script>
  </body>
</html>
