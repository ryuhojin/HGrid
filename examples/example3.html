<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 3 - Column Schema</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      #grid {
        width: 860px;
        margin-top: 12px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        padding: 6px 10px;
        border: 1px solid #b7c3d4;
        background: #f8fafc;
        cursor: pointer;
      }

      #log {
        margin-top: 12px;
        padding: 8px;
        border: 1px solid #d5dbe3;
        background: #fcfdff;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Example 3 - Column Schema</h1>
    <div class="controls">
      <button id="toggle-status">setColumnVisibility()</button>
      <button id="reorder-columns">setColumnOrder()</button>
      <button id="resize-id">setColumnWidth()</button>
      <button id="replace-columns">setColumns()</button>
    </div>
    <pre id="log">Ready</pre>
    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      const columns = [
        {
          id: 'id',
          header: 'ID',
          width: 100,
          minWidth: 80,
          maxWidth: 120,
          type: 'number'
        },
        {
          id: 'fullName',
          header: 'Full Name',
          width: 260,
          type: 'text',
          valueGetter: (row) => `${row.firstName} ${row.lastName}`,
          formatter: (value) => `[${value}]`
        },
        {
          id: 'score',
          header: 'Score',
          width: 140,
          type: 'number',
          comparator: (a, b) => Number(a) - Number(b),
          formatter: (value) => `${value} pt`
        },
        {
          id: 'status',
          header: 'Status',
          width: 160,
          type: 'text',
          visible: false
        }
      ];

      const rowData = Array.from({ length: 1000 }, (_, index) => ({
        id: index + 1,
        firstName: ['Seo', 'Han', 'Kim', 'Park'][index % 4],
        lastName: ['Ari', 'Jin', 'Min', 'Ho'][index % 4],
        score: (index * 17) % 100,
        status: index % 2 === 0 ? 'active' : 'idle',
        updatedAt: new Date(Date.now() - index * 60000).toISOString()
      }));

      const logElement = document.getElementById('log');
      const writeLog = (message) => {
        logElement.textContent = message;
      };

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData,
        height: 420,
        rowHeight: 28,
        overscan: 8
      });

      let isStatusVisible = false;
      let isReordered = false;

      document.getElementById('toggle-status').addEventListener('click', () => {
        isStatusVisible = !isStatusVisible;
        grid.setColumnVisibility('status', isStatusVisible);
        writeLog(`setColumnVisibility(status, ${isStatusVisible})`);
      });

      document.getElementById('reorder-columns').addEventListener('click', () => {
        if (isReordered) {
          grid.setColumnOrder(['id', 'fullName', 'score', 'status']);
        } else {
          grid.setColumnOrder(['score', 'fullName', 'id', 'status']);
        }
        isReordered = !isReordered;
        writeLog('setColumnOrder() applied');
      });

      document.getElementById('resize-id').addEventListener('click', () => {
        grid.setColumnWidth('id', 10);
        writeLog('setColumnWidth(id, 10) -> clamped to minWidth');
      });

      document.getElementById('replace-columns').addEventListener('click', () => {
        grid.setColumns([
          { id: 'id', header: 'ID', width: 90, type: 'number' },
          {
            id: 'displayName',
            header: 'Display Name',
            width: 320,
            type: 'text',
            valueGetter: (row) => `${row.firstName}-${row.lastName}`,
            formatter: (value) => `# ${value}`
          },
          { id: 'score', header: 'Score', width: 160, type: 'number', formatter: (value) => `${value} point` }
        ]);
        writeLog('setColumns() replaced schema');
      });

      grid.on('cellClick', (event) => {
        writeLog(`cellClick row=${event.rowIndex} col=${event.columnId} value=${String(event.value)}`);
      });
    </script>
  </body>
</html>
