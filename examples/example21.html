<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 21 - Worker Sorting</title>
    <link rel="stylesheet" href="../packages/grid-core/dist/grid.css" />
    <style>
      body {
        margin: 24px;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: #0f172a;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .controls button {
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
      }

      .controls button:disabled {
        cursor: default;
        opacity: 0.55;
      }

      #log {
        margin-bottom: 12px;
        padding: 10px 12px;
        border: 1px solid #d5dbe3;
        background: #fcfdff;
        font-size: 12px;
        white-space: pre-wrap;
      }

      #grid {
        width: 1100px;
      }
    </style>
  </head>
  <body>
    <h1>Example 21 - Worker Sorting</h1>
    <div class="controls">
      <button id="sort-score-asc" type="button">sort score asc</button>
      <button id="sort-score-desc-name-asc" type="button">sort score desc + name asc</button>
      <button id="sort-name-length" type="button">sort name length</button>
      <button id="clear-sort" type="button">clear sort</button>
      <button id="swap-1m" type="button">swap synthetic 1M</button>
      <button id="sort-1m" type="button">sort synthetic 1M desc</button>
      <button id="inspect" type="button">inspect</button>
    </div>
    <pre id="log">Ready</pre>
    <div id="grid"></div>

    <script src="../packages/grid-core/dist/grid.umd.js"></script>
    <script>
      class SyntheticLargeDataProvider {
        constructor(rowCount) {
          this.rowCount = rowCount;
        }

        getRowCount() {
          return this.rowCount;
        }

        getRowKey(dataIndex) {
          return dataIndex;
        }

        getValue(dataIndex, columnId) {
          if (columnId === 'id') {
            return dataIndex + 1;
          }
          if (columnId === 'name') {
            return 'Customer-' + (dataIndex + 1);
          }
          if (columnId === 'score') {
            return ((this.rowCount - dataIndex) * 17) % 1000;
          }
          if (columnId === 'region') {
            return ['KR', 'US', 'JP', 'DE'][dataIndex % 4];
          }
          return null;
        }

        setValue() {}

        applyTransactions() {}

        getRow(dataIndex) {
          return {
            id: dataIndex + 1,
            name: 'Customer-' + (dataIndex + 1),
            score: ((this.rowCount - dataIndex) * 17) % 1000,
            region: ['KR', 'US', 'JP', 'DE'][dataIndex % 4]
          };
        }
      }

      const columns = [
        { id: 'id', header: 'ID', width: 110, type: 'number', pinned: 'left' },
        {
          id: 'name',
          header: 'Name',
          width: 240,
          type: 'text',
          comparator: (left, right) => String(left).length - String(right).length
        },
        { id: 'score', header: 'Score', width: 180, type: 'number' },
        { id: 'region', header: 'Region', width: 160, type: 'text', pinned: 'right' }
      ];

      const rowData = Array.from({ length: 5000 }, (_, index) => ({
        id: index + 1,
        name: 'Customer-' + (index + 1),
        score: (index * 37) % 1000,
        region: ['KR', 'US', 'JP', 'DE'][index % 4]
      }));

      const logElement = document.getElementById('log');
      const buttons = Array.from(document.querySelectorAll('.controls button'));

      const grid = new HGrid.Grid(document.getElementById('grid'), {
        columns,
        rowData,
        height: 420,
        rowHeight: 28,
        overscan: 6,
        overscanCols: 2,
        workerRuntime: {
          assetBaseUrl: '../packages/grid-core/dist',
          timeoutMs: 180000
        }
      });

      let isSynthetic = false;
      let running = false;

      function setBusy(isBusy) {
        running = isBusy;
        for (const button of buttons) {
          if (button.id === 'inspect') {
            continue;
          }
          button.disabled = isBusy;
        }
      }

      function getRenderedCellText(rowIndex, columnId) {
        const cell = document.querySelector(
          '.hgrid__row[data-row-index="' + rowIndex + '"] .hgrid__cell[data-column-id="' + columnId + '"]'
        );
        return cell ? cell.textContent : null;
      }

      function snapshot(label, extra) {
        const payload = {
          label,
          snapshot: {
            running,
            isSynthetic,
            sortModel: grid.getSortModel(),
            topRows: {
              r0: {
                id: Number(getRenderedCellText(0, 'id')),
                name: getRenderedCellText(0, 'name'),
                score: Number(getRenderedCellText(0, 'score'))
              },
              r1: {
                id: Number(getRenderedCellText(1, 'id')),
                name: getRenderedCellText(1, 'name'),
                score: Number(getRenderedCellText(1, 'score'))
              }
            }
          },
          extra: extra || null
        };
        logElement.textContent = JSON.stringify(payload);
      }

      async function runSort(label, sortModel) {
        setBusy(true);
        const start = performance.now();
        try {
          await grid.setSortModel(sortModel);
        } catch (error) {
          snapshot(label + '-error', {
            message: error && error.message ? error.message : String(error)
          });
          setBusy(false);
          return;
        }
        setBusy(false);
        snapshot(label, {
          elapsedMs: Math.round(performance.now() - start)
        });
      }

      document.getElementById('sort-score-asc').addEventListener('click', () => {
        runSort('sort-score-asc', [{ columnId: 'score', direction: 'asc' }]);
      });

      document.getElementById('sort-score-desc-name-asc').addEventListener('click', () => {
        runSort('sort-score-desc-name-asc', [
          { columnId: 'score', direction: 'desc' },
          { columnId: 'name', direction: 'asc' }
        ]);
      });

      document.getElementById('sort-name-length').addEventListener('click', () => {
        runSort('sort-name-length', [{ columnId: 'name', direction: 'asc' }]);
      });

      document.getElementById('clear-sort').addEventListener('click', async () => {
        setBusy(true);
        await grid.clearSortModel();
        setBusy(false);
        snapshot('clear-sort');
      });

      document.getElementById('swap-1m').addEventListener('click', () => {
        grid.setOptions({ dataProvider: new SyntheticLargeDataProvider(1_000_000) });
        isSynthetic = true;
        snapshot('swap-1m');
      });

      document.getElementById('sort-1m').addEventListener('click', () => {
        if (!isSynthetic) {
          snapshot('sort-1m-skipped', { reason: 'swap synthetic first' });
          return;
        }

        runSort('sort-1m', [
          { columnId: 'score', direction: 'desc' },
          { columnId: 'id', direction: 'asc' }
        ]);
      });

      document.getElementById('inspect').addEventListener('click', () => {
        snapshot('inspect');
      });

      snapshot('initial');
    </script>
  </body>
</html>
